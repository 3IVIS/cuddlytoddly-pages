ave value blank.\n\nAlways include a final field with:\n  key:      \"additional_context\"\n  label:    \"Anything else I should know?\"\n  value:    \"unknown\"\n  rationale: \"Free-form context that does not fit the fields above.\"\n\nReturn between 3 and 8 fields total (including the additional_context field).\nRespond only in JSON matching the schema.\n", "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "required_input": [], "output": [], "parallel_group": null, "reflection_notes": []}}, "Define_Business_Model": {"id": "Define_Business_Model", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["clarification_How_to_build_a_SaaS_business_from_the_start"], "children": ["Create_Unique_Value_Proposition"], "result": "business_model: \n\nIntroduction:\n    The SaaS business will operate on a subscription-based revenue model, providing software applications over the internet to customers.\n\nRevenue Streams:\n    1. Monthly/Annual Subscription Fees: Customers will pay recurring fees to access the software applications.\n    2. Tiered Pricing: Offer different pricing plans with varying features to cater to diverse customer needs.\n    3. Add-ons and Upgrades: Provide additional features or services for an extra fee.\n\nCost Structure:\n    1. Development Costs: Salaries and benefits for developers, project managers, and quality assurance engineers.\n    2. Infrastructure Costs: Servers, data storage, and network maintenance expenses.\n    3. Marketing and Sales Expenses: Advertising, promotional activities, and sales team salaries.\n    4. Customer Support: Costs associated with providing assistance and maintenance to customers.\n\nNote: The target market, initial budget, number of developers, and other essential details are not provided. These factors will significantly impact the business model, and it is crucial to determine them to create a comprehensive and accurate plan.", "metadata": {"description": "Define the business model for the SaaS business", "output": [{"description": "Document outlining the business model, including revenue streams and cost structure", "name": "business_model", "type": "document"}], "parallel_group": "Business_Model", "required_input": [{"description": "The revenue model for the SaaS business", "name": "revenue_model", "type": "text"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "reflection_notes": [], "verified": true}}, "Research_Market": {"id": "Research_Market", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["clarification_How_to_build_a_SaaS_business_from_the_start"], "children": ["Create_Unique_Value_Proposition"], "result": "market_trends_report: \n    The SaaS market is expected to hit $315 billion in 2026, with a growing demand for software as a service solutions. \n    The market trends include the adoption of artificial intelligence, machine learning, and cloud computing. \n    Competitor analysis is crucial in the SaaS market, with companies like Voxturr, Mordor Intelligence, and Fortune Business Insights providing market research and analysis. \n    The market size and growth of the Software as a Service Market can be compared with other markets in the Technology, Media, and Telecom Industry. \n    A step-by-step approach to identifying opportunities, refining strategies, and staying ahead in the SaaS market includes analyzing competitors, identifying market gaps, and developing a unique value proposition. \n    The latest market research report offers a comprehensive analysis, covering key aspects such as leading companies, product offerings, and applications. \n    Emerging trends in the SaaS market include SaaS security, engagement analytics, and AI accelerators, with market dynamics, investment patterns, and emerging startups driving growth.", "metadata": {"description": "Research the market and potential competitors for the SaaS business", "output": [{"description": "Report outlining the market landscape, including competitors and potential customers", "name": "market_research", "type": "document"}], "parallel_group": "Market_Research", "required_input": [], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "reflection_notes": [], "broadened_description": "Research general market trends and competitor analysis for a subscription-based SaaS business", "broadened_for_missing": ["development_team_size", "initial_budget", "target_market"], "broadened_reason": "This task's output is more useful with specific details about the target market, initial budget, and development team size, which are currently unknown.", "broadened_output": [{"description": "General market trends and competitor analysis report", "name": "market_trends_report", "type": "document"}], "verified": true}}, "Create_Unique_Value_Proposition": {"id": "Create_Unique_Value_Proposition", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["Define_Business_Model", "Research_Market"], "children": ["Develop_Minimum_Viable_Product", "Plan_Launch_and_Marketing"], "result": "value_proposition_template: \n# Introduction\n    The unique value proposition (UVP) is a statement that clearly communicates the benefits and unique aspects of our SaaS business.\n    It should answer the question: \"Why should customers choose our service over others?\"\n\n# Section 1: Target Audience\n    1. Who are our ideal customers?\n    2. What are their pain points and needs?\n    3. How do they currently address these needs?\n\n# Section 2: Unique Benefits\n    1. What sets our SaaS business apart from competitors?\n    2. What unique features or services do we offer?\n    3. How do these benefits address the needs and pain points of our target audience?\n\n# Section 3: Value Statement\n    1. Clearly define our UVP in one sentence.\n    2. Explain how our SaaS business solves the problems or meets the needs of our target audience.\n    3. Highlight the key benefits and unique aspects of our service.\n\n# Section 4: Competitive Advantage\n    1. How do we differentiate ourselves from competitors?\n    2. What unique strengths or assets do we possess?\n    3. How will we maintain our competitive advantage over time?\n\n# Section 5: Call to Action\n    1. What action do we want our target audience to take?\n    2. How will we encourage and support them in taking this action?\n    3. What are the next steps for customers who are interested in our SaaS business?\n", "metadata": {"description": "Create a unique value proposition for the SaaS business", "output": [{"description": "Document outlining the unique value proposition, including key features and benefits", "name": "unique_value_proposition", "type": "document"}], "required_input": [{"description": "The business model for the SaaS business", "name": "business_model", "type": "document"}, {"description": "The market research report", "name": "market_research", "type": "document"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "parallel_group": null, "reflection_notes": [], "broadened_description": "Research general strategies for creating a unique value proposition for a SaaS business and produce a template with guided questions to help a user create their own unique value proposition.", "broadened_for_missing": ["business_model", "market_research"], "broadened_reason": "This task's output is dependent on specific business model and market research documents that are not provided, and these cannot be substituted by web search or general knowledge.", "broadened_output": [{"description": "Template with guided questions and placeholder sections for a user to fill in their own unique value proposition.", "name": "value_proposition_template", "type": "document"}], "verified": true}}, "Develop_Minimum_Viable_Product": {"id": "Develop_Minimum_Viable_Product", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["Create_Unique_Value_Proposition"], "children": ["Plan_Launch_and_Marketing", "Plan_Technical_Requirements"], "result": "mvp_development_summary: \n# Introduction\nDeveloping a minimum viable product (MVP) for a SaaS business requires careful consideration of several key factors.\nThese factors include identifying the target audience, understanding their needs and pain points, and developing a unique value proposition that sets the business apart from competitors.\n\n# Section 1: Target Audience\n1. Identify the ideal customer: Understand who the target audience is, what their pain points and needs are, and how they currently address these needs.\n2. Develop buyer personas: Create detailed profiles of the target audience to guide product development and marketing efforts.\n3. Validate assumptions: Conduct customer discovery interviews and surveys to validate assumptions about the target audience and their needs.\n\n# Section 2: Unique Value Proposition\n1. Define the unique value proposition: Clearly define the unique benefits and value that the SaaS business offers to its customers.\n2. Develop a unique selling proposition: Identify what sets the business apart from competitors and develop a unique selling proposition that communicates this value.\n3. Create a value statement: Clearly define the value that the business offers to its customers and how it solves their problems or meets their needs.\n\n# Section 3: Minimum Viable Product\n1. Define the minimum viable product: Identify the minimum set of features and functionality required to deliver the unique value proposition and meet the needs of the target audience.\n2. Prioritize features: Prioritize features based on customer needs and feedback, and focus on delivering the most important features first.\n3. Develop a prototype: Develop a prototype of the MVP to test and validate assumptions with the target audience.\n\n# Section 4: Iteration and Improvement\n1. Gather feedback: Gather feedback from customers and stakeholders on the MVP and use this feedback to inform future development.\n2. Iterate and improve: Continuously iterate and improve the product based on customer feedback and market trends.\n3. Measure and evaluate: Measure and evaluate the success of the MVP and make data-driven decisions to inform future development.\n\n# Section 5: Launch and Marketing\n1. Develop a launch plan: Develop a plan for launching the MVP, including marketing and sales strategies.\n2. Execute the launch plan: Execute the launch plan and deliver the MVP to the target audience.\n3. Monitor and adjust: Monitor the success of the launch and adjust the marketing and sales strategies as needed.", "metadata": {"description": "Develop a minimum viable product for the SaaS business", "output": [{"description": "The minimum viable product, including key features and functionality", "name": "minimum_viable_product", "type": "data"}], "required_input": [{"description": "The unique value proposition for the SaaS business", "name": "unique_value_proposition", "type": "document"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "parallel_group": null, "reflection_notes": [], "broadened_description": "Research general strategies for developing a minimum viable product for a SaaS business and produce a summary of key considerations.", "broadened_for_missing": ["unique_value_proposition"], "broadened_reason": "This task's output is dependent on the unique value proposition for the SaaS business which is not provided.", "broadened_output": [{"description": "Summary of key considerations for developing a minimum viable product for a SaaS business.", "name": "mvp_development_summary", "type": "document"}], "verified": true}}, "Plan_Technical_Requirements": {"id": "Plan_Technical_Requirements", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["Develop_Minimum_Viable_Product"], "children": ["Develop_Product_Roadmap"], "result": "technical_requirements_summary: \n# Introduction\nDeveloping a SaaS business requires careful consideration of several key technical factors.\nThese factors include scalability, security, reliability, and performance.\n\n# Section 1: Scalability\n1. Horizontal scaling: Ensure the system can scale horizontally to handle increased traffic and user growth.\n2. Vertical scaling: Ensure the system can scale vertically to handle increased load and demand.\n3. Load balancing: Implement load balancing to distribute traffic across multiple servers.\n\n# Section 2: Security\n1. Data encryption: Ensure all data is encrypted in transit and at rest.\n2. Access control: Implement role-based access control to restrict access to sensitive data.\n3. Regular updates: Regularly update software and systems to prevent vulnerabilities.\n\n# Section 3: Reliability\n1. Redundancy: Implement redundancy in critical systems to ensure high availability.\n2. Backup and recovery: Implement regular backups and disaster recovery procedures.\n3. Monitoring: Implement monitoring and alerting to quickly identify and respond to issues.\n\n# Section 4: Performance\n1. Optimization: Optimize database queries and code for performance.\n2. Caching: Implement caching to reduce load and improve response times.\n3. Content delivery networks: Use content delivery networks to reduce latency and improve performance.\n\n# Section 5: Compliance\n1. Data privacy: Ensure compliance with data privacy regulations such as GDPR and CCPA.\n2. Industry standards: Ensure compliance with industry standards such as PCI-DSS and HIPAA.\n3. Auditing: Regularly audit systems and processes to ensure compliance.", "metadata": {"description": "Plan the technical requirements for the SaaS business", "output": [{"description": "Document outlining the technical requirements, including development framework and infrastructure", "name": "technical_requirements", "type": "document"}], "required_input": [{"description": "The minimum viable product for the SaaS business", "name": "minimum_viable_product", "type": "data"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "parallel_group": null, "reflection_notes": [], "broadened_description": "Research general technical requirements for a SaaS business and produce a summary of key considerations", "broadened_for_missing": ["minimum_viable_product"], "broadened_reason": "This task's output is dependent on the minimum viable product for the SaaS business which is not provided.", "broadened_output": [{"description": "Summary of general technical requirements for a SaaS business", "name": "technical_requirements_summary", "type": "document"}], "verified": true}}, "Develop_Product_Roadmap": {"id": "Develop_Product_Roadmap", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["Plan_Technical_Requirements"], "children": ["Plan_Launch_and_Marketing"], "result": "## Product Roadmap Template\n\n### Introduction\nPlease provide a brief introduction to your product and its goals.\n\n### Section 1: Product Vision\n1. What is the overall vision for your product?\n2. What problems does it solve for your customers?\n3. What are the key features and functionalities?\n\n### Section 2: Target Market\n1. Who is your target audience?\n2. What are their needs and pain points?\n3. How will you reach and engage with them?\n\n### Section 3: Competitive Landscape\n1. Who are your main competitors?\n2. What are their strengths and weaknesses?\n3. How will you differentiate your product?\n\n### Section 4: Technical Requirements\nBased on the technical requirements summary provided, please outline the key technical considerations for your product:\n* Scalability: _______________\n* Security: _______________\n* Reliability: _______________\n* Performance: _______________\n* Compliance: _______________\n\n### Section 5: Development Roadmap\nPlease outline the key milestones and timelines for your product development:\n1. What are the short-term goals (next 3-6 months)?\n2. What are the mid-term goals (next 6-12 months)?\n3. What are the long-term goals (next 1-2 years)?\n\n### Section 6: Resource Allocation\n1. What resources (personnel, budget, etc.) will be required to achieve the product vision?\n2. How will these resources be allocated and managed?\n\n### Conclusion\nPlease summarize the key takeaways from your product roadmap and outline the next steps for implementation.", "metadata": {"description": "Develop a detailed product roadmap for the SaaS business", "output": [{"description": "Document outlining the product roadmap, including key milestones and timelines", "name": "product_roadmap", "type": "document"}], "required_input": [{"description": "The technical requirements for the SaaS business", "name": "technical_requirements", "type": "document"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "parallel_group": null, "reflection_notes": [], "broadened_description": "Research general factors that affect product roadmaps for SaaS businesses and produce a template for developing a detailed product roadmap.", "broadened_for_missing": ["technical_requirements"], "broadened_reason": "This task's output is dependent on the technical requirements for the SaaS business which is not provided.", "broadened_output": [{"description": "Template with guided questions and placeholder sections for a user to fill in their own product roadmap details.", "name": "product_roadmap_template", "type": "document"}], "verified": true}}, "Plan_Launch_and_Marketing": {"id": "Plan_Launch_and_Marketing", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["Create_Unique_Value_Proposition", "Develop_Minimum_Viable_Product", "Develop_Product_Roadmap"], "children": ["How_to_build_a_SaaS_business_from_the_start"], "result": "launch_marketing_strategy: \n# Introduction\nA successful SaaS business launch and marketing strategy requires careful planning, execution, and continuous improvement. The following guide outlines key considerations for developing a comprehensive launch and marketing plan.\n\n# Section 1: Unique Value Proposition\n1. Clearly define the unique value proposition: Understand the target audience, their pain points, and how the SaaS business addresses these needs.\n2. Develop a unique selling proposition: Differentiate the business from competitors and communicate the unique benefits and value offered.\n3. Create a value statement: Clearly define the UVP in one sentence and explain how the SaaS business solves the problems or meets the needs of the target audience.\n\n# Section 2: Minimum Viable Product\n1. Identify the target audience: Understand who the ideal customer is, what their pain points and needs are, and how they currently address these needs.\n2. Develop a minimum viable product: Create a product that meets the needs of the target audience and provides a unique value proposition.\n3. Validate assumptions: Conduct customer discovery interviews and surveys to validate assumptions about the target audience and their needs.\n\n# Section 3: Product Roadmap\n1. Develop a product vision: Understand the overall vision for the product and how it aligns with the business goals.\n2. Outline key milestones and timelines: Create a detailed product roadmap, including key milestones and timelines.\n3. Prioritize features and functionalities: Prioritize the development of features and functionalities based on customer needs and business goals.\n\n# Section 4: Marketing Strategy\n1. Develop a marketing plan: Create a comprehensive marketing plan that outlines the strategies and tactics for reaching and engaging with the target audience.\n2. Identify marketing channels: Determine the most effective marketing channels for reaching the target audience, such as social media, content marketing, or paid advertising.\n3. Create a content strategy: Develop a content strategy that aligns with the marketing plan and provides value to the target audience.\n\n# Section 5: Launch Plan\n1. Develop a launch plan: Create a detailed launch plan that outlines the strategies and tactics for launching the SaaS business.\n2. Coordinate launch activities: Coordinate launch activities, such as marketing campaigns, social media promotions, and press releases.\n3. Monitor and evaluate launch performance: Monitor and evaluate the performance of the launch plan and make adjustments as needed.", "metadata": {"description": "Plan the launch and marketing strategy for the SaaS business", "output": [{"description": "Document outlining the launch and marketing strategy, including key milestones and tactics", "name": "launch_and_marketing_strategy", "type": "document"}], "required_input": [{"description": "The unique value proposition for the SaaS business", "name": "unique_value_proposition", "type": "document"}, {"description": "The minimum viable product for the SaaS business", "name": "minimum_viable_product", "type": "data"}, {"description": "The product roadmap for the SaaS business", "name": "product_roadmap", "type": "document"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start", "parallel_group": null, "reflection_notes": [], "broadened_description": "Research general strategies for planning a SaaS business launch and marketing, including unique value propositions, minimum viable products, and product roadmaps.", "broadened_for_missing": ["minimum_viable_product", "product_roadmap", "unique_value_proposition"], "broadened_reason": "This task's output is dependent on specific private information that only the user can provide, including the unique value proposition, minimum viable product, and product roadmap for the SaaSbusiness", "broadened_output": [{"description": "General launch and marketing strategy guide for a SaaS business", "name": "launch_marketing_strategy", "type": "document"}], "verified": true}}};

ing strategy for the SaaS business", "output": [{"description": "Document outlining the launch and marketing strategy, including key milestones and tactics", "name": "launch_and_marketing_strategy", "type": "document"}], "required_input": [{"description": "The unique value proposition for the SaaS business", "name": "unique_value_proposition", "type": "document"}, {"description": "The minimum viable product for the SaaS business", "name": "minimum_viable_product", "type": "data"}, {"description": "The product roadmap for the SaaS business", "name": "product_roadmap", "type": "document"}], "parent_goal": "How_to_build_a_SaaS_business_from_the_start"}}, "timestamp": "2026-04-06T11:23:33.877641+00:00"}, {"type": "ADD_DEPENDENCY", "payload": {"node_id": "How_to_build_a_SaaS_business_from_the_start", "depends_on": "Plan_Launch_and_Marketing", "origin": "planning"}, "timestamp": "2026-04-06T11:23:33.877810+00:00"}, {"type": "SET_RESULT", "payload": {"node_id": "How_to_build_a_SaaS_business_from_the_start", "result": "To build a SaaS business from the start, we first need to define the business model, which depends on the revenue model. Since the revenue model is subscription-based, we can proceed with defining the business model. In parallel, we can research the market and potential competitors to understand the landscape. Once we have the business model and market research, we can create a unique value proposition and develop a minimum viable product. Then, we can plan the technical requirements, including the development framework and infrastructure, and develop a detailed product roadmap. Finally, we can plan the launch and marketing strategy, which depends on the unique value proposition, minimum viable product, and product roadmap."}, "timestamp": "2026-04-06T11:23:33.877948+00:00"}, {"type": "ADD_DEPENDENCY", "payload": {"node_id": "Define_Business_Model", "depends_on": "clarification_How_to_build_a_SaaS_business_from_the_start", "origin": "planning"}, "timestamp": gence, and Fortune Business Insights providing market research and analysis. \n    The market size and growth of the Software as a Service Market can be compared with other markets in the Technology, Media, and Telecom Industry. \n    A step-by-step approach to identifying opportunities, refining strategies, and staying ahead in the SaaS market includes analyzing competitors, identifying market gaps, and developing a unique value proposition. \n    The latest market research report offers a comprehensive analysis, covering key aspects such as leading companies, product offerings, and applications. \n    Emerging trends in the SaaS market include SaaS security, engagement analytics, and AI accelerators, with market dynamics, investment patterns, and emerging startups driving growth."}, "timestamp": "2026-04-06T11:28:08.979797+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Research_Market", "metadata": {"verified": true}}, "timestamp": "2026-04-06T11:28:08.980169+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Research_Market__step_web_search", "metadata": {"hidden": true}}, "timestamp": "2026-04-06T11:28:08.980389+00:00"}, {"type": "MARK_RUNNING", "payload": {"node_id": "Create_Unique_Value_Proposition"}, "timestamp": "2026-04-06T11:28:20.471088+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Create_Unique_Value_Proposition", "metadata": {"broadened_description": "Research general strategies for creating a unique value proposition for a SaaS business and produce a template with guided questions to help a user create their own unique value proposition.", "broadened_for_missing": ["business_model", "market_research"], "broadened_reason": "This task's output is dependent on specific business model and market research documents that are not provided, and these cannot be substituted by web search or general knowledge.", "broadened_output": [{"description": "Template with guided questions and placeholder sections for a user to fill in their own unique value proposition.", "name": "value_proposition_template", "type": "document"}]}}, "timestamp": "2026-04-06T11:30:30.334488+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Create_Unique_Value_Proposition", "result": "value_proposition_template: \n# Introduction\n    The unique value proposition (UVP) is a statement that clearly communicates the benefits and unique aspects of our SaaS business.\n    It should answer the question: \"Why should customers choose our service over others?\"\n\n# Section 1: Target Audience\n    1. Who are our ideal customers?\n    2. What are their pain points and needs?\n    3. How do they currently address these needs?\n\n# Section 2: Unique Benefits\n    1. What sets our SaaS business apart from competitors?\n    2. What unique features or services do we offer?\n    3. How do these benefits address the needs and pain points of our target audience?\n\n# Section 3: Value Statement\n    1. Clearly define our UVP in one sentence.\n    2. Explain how our SaaS business solves the problems or meets the needs of our target audience.\n    3. Highlight the key benefits and unique aspects of our service.\n\n# Section 4: Competitive Advantage\n    1. How do we differentiate ourselves from competitors?\n    2. What unique strengths or assets do we possess?\n    3. How will we maintain our competitive advantage over time?\n\n# Section 5: Call to Action\n    1. What action do we want our target audience to take?\n    2. How will we encourage and support them in taking this action?\n    3. What are the next steps for customers who are interested in our SaaS business?\n"}, "timestamp": "2026-04-06T11:30:46.527021+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Create_Unique_Value_Proposition", "metadata": {"verified": true}}, "timestamp": "2026-04-06T11:30:46.527530+00:00"}, {"type": "MARK_RUNNING", "payload": {"node_id": "Develop_Minimum_Viable_Product"}, "timestamp": "2026-04-06T11:30:55.911344+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Develop_Minimum_Viable_Product", "metadata": {"broadened_description": "Research general strategies for developing a minimum viable product for a SaaS business and produce a summary of key considerations.", "broadened_for_missing": ["unique_value_proposition"], "broadened_reason": "This task's output is dependent on the unique value proposition for the SaaS business which is not provided.", "broadened_output": [{"description": "Summary of key considerations for developing a minimum viable product for a SaaS business.", "name": "mvp_development_summary", "type": "document"}]}}, "timestamp": "2026-04-06T11:33:20.907356+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Develop_Minimum_Viable_Product", "result": "mvp_development_summary: \n# Introduction\nDeveloping a minimum viable product (MVP) for a SaaS business requires careful consideration of several key factors.\nThese factors include identifying the target audience, understanding their needs and pain points, and developing a unique value proposition that sets the business apart from competitors.\n\n# Section 1: Target Audience\n1. Identify the ideal customer: Understand who the target audience is, what their pain points and needs are, and how they currently address these needs.\n2. Develop buyer personas: Create detailed profiles of the target audience to guide product development and marketing efforts.\n3. Validate assumptions: Conduct customer discovery interviews and surveys to validate assumptions about the target audience and their needs.\n\n# Section 2: Unique Value Proposition\n1. Define the unique value proposition: Clearly define the unique benefits and value that the SaaS business offers to its customers.\n2. Develop a unique selling proposition: Identify what sets the business apart from competitors and develop a unique selling proposition that communicates this value.\n3. Create a value statement: Clearly define the value that the business offers to its customers and how it solves their problems or meets their needs.\n\n# Section 3: Minimum Viable Product\n1. Define the minimum viable product: Identify the minimum set of features and functionality required to deliver the unique value proposition and meet the needs of the target audience.\n2. Prioritize features: Prioritize features based on customer needs and feedback, and focus on delivering the most important features first.\n3. Develop a prototype: Develop a prototype of the MVP to test and validate assumptions with the target audience.\n\n# Section 4: Iteration and Improvement\n1. Gather feedback: Gather feedback from customers and stakeholders on the MVP and use this feedback to inform future development.\n2. Iterate and improve: Continuously iterate and improve the product based on customer feedback and market trends.\n3. Measure and evaluate: Measure and evaluate the success of the MVP and make data-driven decisions to inform future development.\n\n# Section 5: Launch and Marketing\n1. Develop a launch plan: Develop a plan for launching the MVP, including marketing and sales strategies.\n2. Execute the launch plan: Execute the launch plan and deliver the MVP to the target audience.\n3. Monitor and adjust: Monitor the success of the launch and adjust the marketing and sales strategies as needed."}, "timestamp": "2026-04-06T11:33:40.755935+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Develop_Minimum_Viable_Product", "metadata": {"verified": true}}, "timestamp": "2026-04-06T11:33:40.756195+00:00"}, {"type": "MARK_RUNNING", "payload": {"node_id": "Plan_Technical_Requirements"}, "timestamp": "2026-04-06T11:33:52.245623+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Plan_Technical_Requirements", "metadata": {"broadened_description": "Research general technical requirements for a SaaS business and produce a summary of key considerations", "broadened_for_missing": ["minimum_viable_product"], "broadened_reason": "This task's output is dependent on the minimum viable product for the SaaS business which is not provided.", "broadened_output": [{"description": "Summary of general technical requirements for a SaaS business", "name": "technical_requirements_summary", "type": "document"}]}}, "timestamp": "2026-04-06T11:35:55.565479+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Plan_Technical_Requirements", "result": "technical_requirements_summary: \n# Introduction\nDeveloping a SaaS business requires careful consideration of several key technical factors.\nThese factors include scalability, security, reliability, and performance.\n\n# Section 1: Scalability\n1. Horizontal scaling: Ensure the system can scale horizontally to handle increased traffic and user growth.\n2. Vertical scaling: Ensure the system can scale vertically to handle increased load and demand.\n3. Load balancing: Implement load balancing to distribute traffic across multiple servers.\n\n# Section 2: Security\n1. Data encryption: Ensure all data is encrypted in transit and at rest.\n2. Access control: Implement role-based access control to restrict access to sensitive data.\n3. Regular updates: Regularly update software and systems to prevent vulnerabilities.\n\n# Section 3: Reliability\n1. Redundancy: Implement redundancy in critical systems to ensure high availability.\n2. Backup and recovery: Implement regular backups and disaster recovery procedures.\n3. Monitoring: Implement monitoring and alerting to quickly identify and respond to issues.\n\n# Section 4: Performance\n1. Optimization: Optimize database queries and code for performance.\n2. Caching: Implement caching to reduce load and improve response times.\n3. Content delivery networks: Use content delivery networks to reduce latency and improve performance.\n\n# Section 5: Compliance\n1. Data privacy: Ensure compliance with data privacy regulations such as GDPR and CCPA.\n2. Industry standards: Ensure compliance with industry standards such as PCI-DSS and HIPAA.\n3. Auditing: Regularly audit systems and processes to ensure compliance."}, "timestamp": "2026-04-06T11:36:14.523323+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Plan_Technical_Requirements", "metadata": {"verified": true}}, "timestamp": "2026-04-06T11:36:14.523676+00:00"}, {"type": "MARK_RUNNING", "payload": {"node_id": "Develop_Product_Roadmap"}, "timestamp": "2026-04-06T11:36:23.749470+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Develop_Product_Roadmap", "metadata": {"broadened_description": "Research general factors that affect product roadmaps for SaaS businesses and produce a template for developing a detailed product roadmap.", "broadened_for_missing": ["technical_requirements"], "broadened_reason": "This task's output is dependent on the technical requirements for the SaaS business which is not provided.", "broadened_output": [{"description": "Template with guided questions and placeholder sections for a user to fill in their own product roadmap details.", "name": "product_roadmap_template", "type": "document"}]}}, "timestamp": "2026-04-06T11:38:31.514216+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Develop_Product_Roadmap", "result": "## Product Roadmap Template\n\n### Introduction\nPlease provide a brief introduction to your product and its goals.\n\n### Section 1: Product Vision\n1. What is the overall vision for your product?\n2. What problems does it solve for your customers?\n3. What are the key features and functionalities?\n\n### Section 2: Target Market\n1. Who is your target audience?\n2. What are their needs and pain points?\n3. How will you reach and engage with them?\n\n### Section 3: Competitive Landscape\n1. Who are your main competitors?\n2. What are their strengths and weaknesses?\n3. How will you differentiate your product?\n\n### Section 4: Technical Requirements\nBased on the technical requirements summary provided, please outline the key technical considerations for your product:\n* Scalability: ___ \n# Introduction\nA successful SaaS business launch and marketing strategy requires careful planning, execution, and continuous improvement. The following guide outlines key considerations for developing a comprehensive launch and marketing plan.\n\n# Section 1: Unique Value Proposition\n1. Clearly define the unique value proposition: Understand the target audience, their pain points, and how the SaaS business addresses these needs.\n2. Develop a unique selling proposition: Differentiate the business from competitors and communicate the unique benefits and value offered.\n3. Create a value statement: Clearly define the UVP in one sentence and explain how the SaaS business solves the problems or meets the needs of the target audience.\n\n# Section 2: Minimum Viable Product\n1. Identify the target audience: Understand who the ideal customer is, what their pain points and needs are, and how they currently address these needs.\n2. Develop a minimum viable product: Create a product that meets the needs of the target audience and provides a unique value proposition.\n3. Validate assumptions: Conduct customer discovery interviews and surveys to validate assumptions about the target audience and their needs.\n\n# Section 3: Product Roadmap\n1. Develop a product vision: Understand the overall vision for the product and how it aligns with the business goals.\n2. Outline key milestones and timelines: Create a detailed product roadmap, including key milestones and timelines.\n3. Prioritize features and functionalities: Prioritize the development of features and functionalities based on customer needs and business goals.\n\n# Section 4: Marketing Strategy\n1. Develop a marketing plan: Create a comprehensive marketing plan that outlines the strategies and tactics for reaching and engaging with the target audience.\n2. Identify marketing channels: Determine the most effective marketing channels for reaching the target audience, such as social media, content marketing, or paid advertising.\n3. Create a content strategy: Develop a content strategy that aligns with the marketing plan and provides value to the target audience.\n\n# Section 5: Launch Plan\n1. Develop a launch plan: Create a detailed launch plan that outlines the strategies and tactics for launching the SaaS business.\n2. Coordinate launch activities: Coordinate launch activities, such as marketing campaigns, social media promotions, and press releases.\n3. Monitor and evaluate launch performance: Monitor and evaluate the performance of the launch plan and make adjustments as needed."}, "timestamp": "2026-04-06T11:42:21.448019+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Plan_Launch_and_Marketing", "metadata": {"verified": true}}, "timestamp": "2026-04-06T11:42:21.448535+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "How_to_build_a_SaaS_business_from_the_start", "result": "To build a SaaS business from the start, we first need to define the business model, which depends on the revenue model. Since the revenue model is subscription-based, we can proceed with defining the business model. In parallel, we can research the market and potential competitors to understand the landscape. Once we have the business model and market research, we can create a unique value proposition and develop a minimum viable product. Then, we can plan the technical requirements, including the development framework and infrastructure, and develop a detailed product roadmap. Finally, we can plan the launch and marketing strategy, which depends on the unique value proposition, minimum viable product, and product roadmap."}, "timestamp": "2026-04-06T11:42:21.696102+00:00"}];

  pending: '#475569', ready: '#3b82f6', running: '#f59e0b',
  done: '#10b981', failed: '#ef4444', to_be_expanded: '#8b5cf6',
  awaiting_input: '#e879f9',

// ── Header ────────────────────────────────────────────────────────────────────

(function populateHeader() {
  // Goal title
  const goal = Object.values(nodes).find(n => n.node_type === 'goal');
  const goalDesc = goal?.metadata?.description || goal?.id || '';

    const el = document.getElementById('toolbar-goal');

    el.title = goalDesc;

  // Status counts
  const counts = {};
  for (const n of Object.values(nodes)) {
    if (n.node_type === 'execution_step') continue;

  const visible = Object.values(nodes).filter(n => n.node_type !== 'execution_step');
  document.getElementById('cnt-done').textContent    = counts.done    || 0;

  const awaitingPill = document.getElementById('pill-awaiting');
  if (awaitingPill) awaitingPill.style.display = awaitingCount > 0 ? '' : 'none';
  document.getElementById('cnt-total').textContent   = visible.length;

  // Timestamp
  document.getElementById('toolbar-ts').textContent =
    `Exported ${meta.timestamp}`;
  document.title = goalDesc
    ? `cuddlytoddly — ${goalDesc}`
    : 'cuddlytoddly — DAG snapshot';

function initSVG() {

  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '-0 -4 8 8')
    .attr('refX', 7).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#2e3f58');

  svgG = svg.append('g').attr('class', 'root');
  svgG.append('g').attr('class', 'edge-layer');
  svgG.append('g').attr('class', 'node-layer');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.08, 4])
    .on('zoom', e => svgG.attr('transform', e.transform));
  svg.call(zoomBehavior);
}

// ── Layout + Render ──────────────────────────────────────────────────────────

function renderDAG() {
  const g = new dagre.graphlib.Graph({ multigraph: false });
  g.setGraph({ rankdir: 'TB', ranksep: 80, nodesep: 44, marginx: 48, marginy: 48 });
  g.setDefaultEdgeLabel(() => ({}));

  const _src = (replayMode ? replayState : nodes);
  const visible = Object.entries(_src)
    .filter(([, n]) => n.node_type !== 'execution_step');

  for (const [id] of visible) {
    g.setNode(id, { width: NODE_W, height: NODE_H });
  }
  const visibleIds = new Set(visible.map(([id]) => id));
  for (const [id, node] of visible) {
    for (const dep of node.dependencies) {
      if (visibleIds.has(dep)) g.setEdge(dep, id);
    }
  }
  dagre.layout(g);
  currentG = g;

  // Edges
  const line = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);
  const edgeLayer = svgG.select('.edge-layer');
  const edgeData = g.edges().map(e => ({
    key: `${e.v}__${e.w}`, v: e.v, w: e.w, points: g.edge(e).points,
  }));
  const edges = edgeLayer.selectAll('path.edge-path').data(edgeData, d => d.key);
  edges.enter().append('path').attr('class', 'edge-path')
    .merge(edges)
    .attr('d', d => line(d.points))
    .attr('stroke', d => STATUS_COLOR_HEX[_src[d.v]?.status] || '#2e3f58')
    .attr('stroke-opacity', d => _src[d.v]?.status === 'done' ? 0.35 : 0.55);
  edges.exit().remove();

  // Nodes
  const nodeLayer = svgG.select('.node-layer');
  const nodeData = g.nodes().filter(id => _src[id])
    .map(id => ({ id, pos: g.node(id), node: _src[id] }));

  const nodeGs = nodeLayer.selectAll('g.node-g').data(nodeData, d => d.id);

  const entered = nodeGs.enter().append('g')
    .attr('class', 'node-g')
    .on('click', (e, d) => { e.stopPropagation(); selectNode(d.id); });

  entered.append('rect').attr('class', 'node-hit')
    .attr('x', -NODE_W/2 - 4).attr('y', -NODE_H/2 - 4)
    .attr('width', NODE_W + 8).attr('height', NODE_H + 8)
    .attr('rx', 10).attr('fill', 'transparent');

  entered.append('rect').attr('class', 'status-ring')
    .attr('x', -NODE_W/2 - 2).attr('y', -NODE_H/2 - 2)
    .attr('width', NODE_W + 4).attr('height', NODE_H + 4)
    .attr('rx', 9).attr('fill', 'none').attr('stroke-width', 2).attr('stroke', 'transparent');

  entered.append('rect').attr('class', 'bg')
    .attr('x', -NODE_W/2).attr('y', -NODE_H/2)
    .attr('width', NODE_W).attr('height', NODE_H).attr('rx', 7);

  entered.append('rect').attr('class', 'sbar')
    .attr('x', -NODE_W/2 + 4).attr('y', -NODE_H/2 + 7)
    .attr('width', 3).attr('height', NODE_H - 14).attr('rx', 1.5);

  entered.append('text').attr('class', 'ticon');
  entered.append('text').attr('class', 'tdesc');
  entered.append('text').attr('class', 'tstatus');
  entered.append('text').attr('class', 'ttype');

  const merged = entered.merge(nodeGs);

  merged
    .attr('transform', d => `translate(${d.pos.x}, ${d.pos.y})`)
    .attr('class', d => `node-g ${d.id === selectedId ? 'selected' : ''}`);

  const isGoal = d => d.node.node_type === 'goal';
  merged.select('.bg')
    .attr('fill', d => d.id === selectedId ? '#1e2a3d' : '#111827')
    .attr('stroke', d => d.id === selectedId ? '#6366f1' : isGoal(d) ? '#312e81' : '#1f2d42')
    .attr('stroke-width', d => d.id === selectedId ? 2 : isGoal(d) ? 1.5 : 1);

  merged.select('.status-ring')
    .attr('stroke', d => d.id === selectedId ? '#6366f1' : 'transparent')
    .attr('stroke-opacity', d => d.id === selectedId ? 0.4 : 0);

  merged.select('.sbar').attr('fill', d => STATUS_COLOR_HEX[d.node.status] || '#475569');

  merged.select('.ticon')
    .attr('x', -NODE_W/2 + 14).attr('y', -NODE_H/2 + 20)
    .attr('font-size', 12).attr('font-family', 'monospace')
    .attr('fill', d => TYPE_COLOR[d.node.node_type] || '#94a3b8')
    .text(d => TYPE_ICON[d.node.node_type] || '▣');

  merged.select('.tdesc')
    .attr('x', -NODE_W/2 + 28).attr('y', -NODE_H/2 + 20)
    .attr('font-size', 12).attr('font-family', 'system-ui, sans-serif').attr('font-weight', '500')
    .attr('fill', '#e2e8f0')
    .text(d => trunc(d.node.metadata?.description || d.id, 24));

  merged.select('.tstatus')
    .attr('x', -NODE_W/2 + 14).attr('y', -NODE_H/2 + 38)
    .attr('font-size', 10).attr('font-family', 'system-ui, sans-serif')
    .attr('fill', d => STATUS_COLOR_HEX[d.node.status] || '#475569')
    .text(d => d.node.status);

  merged.select('.ttype')
    .attr('x', NODE_W/2 - 8).attr('y', -NODE_H/2 + 38)
    .attr('font-size', 10).attr('font-family', 'system-ui, sans-serif')
    .attr('text-anchor', 'end').attr('fill', '#2e3f58')
    .text(d => d.node.node_type);

  nodeGs.exit().remove();

  svg.on('click', () => { if (selectedId) closePanel(); });
}

// ── Selection ────────────────────────────────────────────────────────────────

function selectNode(id) {
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  selectedId = id;
  renderDAG();
  updatePanel();
}

function updatePanel() {
  const _panelNodes = (replayMode ? replayState : nodes);
  const node = _panelNodes[selectedId];
  if (!node) return;

  document.getElementById('info-panel').classList.remove('hidden');
  document.getElementById('panel-title').textContent = selectedId;

  const body  = document.getElementById('panel-body');
  const desc  = node.metadata?.description || '';
  const deps  = node.dependencies || [];
  const result = node.result;
  const reqIn  = node.metadata?.required_input || [];
  const output = node.metadata?.output || [];
  const notes  = node.metadata?.reflection_notes || [];

  const _panelSrc = _panelNodes;
  const stepChildren = Object.values(_panelSrc).filter(n =>
    n.node_type === 'execution_step' &&
    n.dependencies.includes(selectedId) &&
    !n.metadata?.hidden
  );

  let html = '';

  // ── Clarification node — render fields as a structured list ──────────────
  if (node.node_type === 'clarification') {
    let fields = [];
    try { fields = JSON.parse(result || '[]'); } catch (_) {}
    let fhtml = '';
    if (desc) fhtml += row('', `<span style="color:var(--text-muted);font-size:12px">${esc(desc)}</span>`);
    fields.forEach(f => {
      const isUnknown = !f.value || f.value === 'unknown';
      const valColor  = isUnknown ? 'var(--s-failed)' : 'var(--text)';
      fhtml += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${esc(f.label || f.key)}</div>
        <div style="font-size:13px;color:${valColor};margin-bottom:3px">${esc(isUnknown ? 'unknown' : f.value)}</div>
        ${f.rationale ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic">${esc(f.rationale)}</div>` : ''}
      </div>`;
    });
    if (!fields.length) fhtml += '<div style="color:var(--text-muted);font-size:12px">No fields generated.</div>';
    body.innerHTML = fhtml;
    return;
  }

  if (desc) html += row('Description', `<span class="info-value prominent">${esc(desc)}</span>`);

  // ── Broadened description indicator ──────────────────────────────────────
  const broadDesc   = node.metadata?.broadened_description || '';
  const broadReason = node.metadata?.broadened_reason || '';
  const broadMissing = node.metadata?.broadened_for_missing || [];
  if (broadDesc) {
    const missingText = broadMissing.length
      ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">` +
        `Missing inputs: ${esc(broadMissing.join(', '))}</div>`
      : '';
    const reasonText = broadReason
      ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic;margin-top:2px">` +
        `${esc(broadReason)}</div>`
      : '';
    html += row('Running as', `
      <div style="background:var(--bg-raised);border:1px solid var(--s-running)30;border-left:3px solid var(--s-running);border-radius:4px;padding:8px 10px">
        <div style="font-size:10px;color:var(--s-running);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">
          ⟳ Broadened goal
        </div>
        <span class="info-value">${esc(broadDesc)}</span>
        ${missingText}
        ${reasonText}
      </div>`);
  }

  // ── Awaiting input indicator ──────────────────────────────────────────────
  if (node.status === 'awaiting_input') {
    const awaitReason  = node.metadata?.awaiting_input_reason || '';
    const awaitMissing = node.metadata?.missing_fields || [];
    const missingList  = awaitMissing.length
      ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">` +
        `Waiting for: ${esc(awaitMissing.join(', '))}</div>`
      : '';
    const reasonLine = awaitReason
      ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic;margin-top:2px">${esc(awaitReason)}</div>`
      : '';
    html += row('Awaiting input', `
      <div style="border:1px solid var(--s-awaiting)40;border-left:3px solid var(--s-awaiting);border-radius:4px;padding:8px 10px">
        <div style="font-size:10px;color:var(--s-awaiting);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">
          ⏳ Waiting for user input
        </div>
        ${missingList}
        ${reasonLine}
      </div>`);
  }

  html += row('Status &amp; Type', `
    <span class="badge" style="color:${STATUS_COLOR_HEX[node.status]};border-color:${STATUS_COLOR_HEX[node.status]}30">
      <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLOR_HEX[node.status]};display:inline-block"></span>
      ${esc(node.status)}
    </span>
    &nbsp;
    <span class="badge" style="color:${TYPE_COLOR[node.node_type] || '#94a3b8'}">
      ${TYPE_ICON[node.node_type]} ${esc(node.node_type)}
    </span>
  `);

  if (deps.length) {
    html += row('Dependencies', deps.map(d =>
      `<span class="dep-tag" onclick="selectNode('${esc(d)}')">${esc(d)}</span>`
    ).join(''));
  }

  if (reqIn.length) {
    html += row('Requires', reqIn.map(i =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">
        <span style="color:var(--text-dim)">${esc(i.name)}</span>
        <span style="color:var(--s-pending);font-size:10px"> [${esc(i.type)}]</span>
        — ${esc(i.description || '')}
      </div>`
    ).join(''));
  }

  if (output.length) {
    html += row('Outputs', output.map(o =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">
        <span style="color:var(--text-dim)">${esc(o.name)}</span>
        <span style="color:var(--s-ready);font-size:10px"> [${esc(o.type)}]</span>
        — ${esc(o.description || '')}
      </div>`
    ).join(''));
  }

  if (result != null) {
    const label = node.node_type === 'goal' ? 'Plan' : 'Result';
    html += row(label, `<div class="result-box">${esc(String(result))}</div>`);
  }

  if (notes.length) {
    html += row('Notes', notes.map(n =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">• ${esc(n)}</div>`
    ).join(''));
  }

  if (stepChildren.length) {
    const stepsHtml = stepChildren.map(step => {
      const icon = step.status === 'done' ? '✓' : step.status === 'failed' ? '✗' : '·';
      const col  = step.status === 'done' ? 'var(--s-done)' : step.status === 'failed' ? 'var(--s-failed)' : 'var(--s-pending)';
      return `<div class="step-item">
        <span class="step-icon" style="color:${col}">${icon}</span>
        <div>
          <div class="step-desc">${esc(step.metadata?.description || step.id)}</div>
          ${step.result ? `<div class="step-result">${esc(trunc(step.result, 120))}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    html += row('Execution Steps', `<div style="margin-top:2px">${stepsHtml}</div>`);
  }

  body.innerHTML = html || '<div style="color:var(--text-muted);font-size:12px">No details available.</div>';
}

function row(label, content) {
  return `<div class="info-row">
    <div class="info-label">${label}</div>
    <div class="info-value">${content}</div>
  </div>`;
}

function closePanel() {
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  selectedId = null;
  document.getElementById('info-panel').classList.add('hidden');
  renderDAG();
}

// ── Panel drag ────────────────────────────────────────────────────────────────

(function() {
  let dragging = false, ox, oy;
  const panel  = document.getElementById('info-panel');
  const handle = document.getElementById('panel-drag-handle');

  handle.addEventListener('mousedown', e => {
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    panel.style.left = (e.clientX - ox) + 'px';
    panel.style.top  = (e.clientY - oy) + 'px';
    panel.style.right = panel.style.bottom = 'auto';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Panel resize ──────────────────────────────────────────────────────────────

(function() {
  let resizing = false, startX, startY, startW, startH;
  const panel  = document.getElementById('info-panel');
  const handle = document.getElementById('panel-resize-handle');

  handle.addEventListener('mousedown', e => {
    resizing = true;
    startX = e.clientX; startY = e.clientY;
    const r = panel.getBoundingClientRect();
    startW = r.width; startH = r.height;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    panel.style.width    = Math.max(240, startW + (e.clientX - startX)) + 'px';
    panel.style.height   = Math.max(160, startH + (e.clientY - startY)) + 'px';
    panel.style.maxHeight = 'none';
  });
  document.addEventListener('mouseup', () => { resizing = false; });
})();

// ── Zoom controls ─────────────────────────────────────────────────────────────

function zoomIn()    { svg.transition().call(zoomBehavior.scaleBy, 1.4); }
function zoomOut()   { svg.transition().call(zoomBehavior.scaleBy, 0.7); }
function zoomReset() { fitGraph(); }

function fitGraph() {
  if (!currentG) return;
  const graph = currentG.graph();
  if (!graph.width || !graph.height) return;
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight, pad = 60;
  const scale = Math.min((W - pad*2) / graph.width, (H - pad*2) / graph.height, 1.2);
  svg.transition().duration(400).call(
    zoomBehavior.transform,
    d3.zoomIdentity
      .translate((W - graph.width * scale) / 2, (H - graph.height * scale) / 2)
      .scale(scale)
  );
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(s, n) {
  s = String(s);
  return s.length > n ? s.slice(0, n-1) + '…' : s;
}


// ── Replay engine ────────────────────────────────────────────────────────────

let replayMode    = false;
let replayState   = {};
let replayFrame   = 0;
let replayPlaying = false;
let replayTimer   = null;
let replayFirstFit = true;

// ── Replay auto-open panel ────────────────────────────────────────────────────
// While playing, every node that gets a result auto-opens the info panel for
// AUTO_OPEN_MS milliseconds, then closes automatically before the next one.

let autoOpenTimer  = null;   // setTimeout handle for auto-close
let autoOpenActive = false;  // true while the panel is open due to auto-replay
const AUTO_OPEN_MS = 2500;   // how long each result panel stays visible

function autoOpenNode(id) {
  // Skip execution_step nodes — they fire frequently and are low-signal
  const nodeType = (replayState[id] || {}).node_type;
  if (nodeType === 'execution_step') return;

  // Cancel any existing auto-close timer before opening the next node
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; }

  autoOpenActive = true;
  selectedId     = id;
  renderDAG();
  updatePanel();

  autoOpenTimer = setTimeout(() => {
    autoOpenTimer  = null;
    autoOpenActive = false;
    closePanel();
  }, AUTO_OPEN_MS);
}

const CHECKPOINT_EVERY = 20;
let   replayCheckpoints = [];

// Pre-compute checkpoints at page load (runs synchronously, fast for typical logs)
(function buildCheckpoints() {
  if (!REPLAY_EVENTS || !REPLAY_EVENTS.length) return;
  let state = {};
  replayCheckpoints.push({});          // checkpoint[0] = empty graph
  for (let i = 0; i < REPLAY_EVENTS.length; i++) {
    applyEventInPlace(state, REPLAY_EVENTS[i]);
    recomputeReadiness(state);
    if ((i + 1) % CHECKPOINT_EVERY === 0) {
      replayCheckpoints.push(deepCopyState(state));
    }
  }
  document.getElementById('btn-replay').classList.remove('hidden');
})();

// ── Mini reducer ─────────────────────────────────────────────────────────────

function applyEventInPlace(state, event) {
  const t = event.type, p = event.payload || {}, id = p.node_id;
  if (t === 'ADD_NODE' || t === 'INSERT_NODE') {
    if (!state[id]) {
      const deps = (p.dependencies || []);
      state[id] = { id, node_type: p.node_type||'task', status: 'pending',
        dependencies: deps.slice(), children: [], result: null,
        metadata: Object.assign({}, p.metadata||{}), origin: p.origin||'system' };
      for (const dep of deps)
        if (state[dep] && !state[dep].children.includes(id)) state[dep].children.push(id);
    } else {
      const prev = state[id].metadata.description || '';
      Object.assign(state[id].metadata, p.metadata||{});
      if (prev) state[id].metadata.description = prev;
      if (p.node_type) state[id].node_type = p.node_type;
    }
  } else if (t === 'REMOVE_NODE') {
    if (state[id]) {
      for (const dep of state[id].dependencies)
        if (state[dep]) state[dep].children = state[dep].children.filter(c => c !== id);
      for (const child of state[id].children)
        if (state[child]) state[child].dependencies = state[child].dependencies.filter(d => d !== id);
      delete state[id];
    }
  } else if (t === 'ADD_DEPENDENCY') {
    const [s, dep] = [p.node_id, p.depends_on];
    if (state[s]   && !state[s].dependencies.includes(dep)) state[s].dependencies.push(dep);
    if (state[dep] && !state[dep].children.includes(s))     state[dep].children.push(s);
  } else if (t === 'REMOVE_DEPENDENCY') {
    const [s, dep] = [p.node_id, p.depends_on];
    if (state[s])   state[s].dependencies = state[s].dependencies.filter(d => d !== dep);
    if (state[dep]) state[dep].children   = state[dep].children.filter(c => c !== s);
  } else if (t === 'MARK_RUNNING') {
    if (state[id]) state[id].status = 'running';
  } else if (t === 'MARK_DONE') {
    if (state[id]) { state[id].status = 'done'; if (p.result !== undefined) state[id].result = p.result; }
  } else if (t === 'MARK_FAILED') {
    if (state[id]) state[id].status = 'failed';
  } else if (t === 'RESET_NODE') {
    if (state[id]) { state[id].status = 'pending'; state[id].result = null; }
  } else if (t === 'SET_RESULT') {
    if (state[id] && p.result !== undefined) state[id].result = p.result;
  } else if (t === 'UPDATE_STATUS') {
    if (state[id]) state[id].status = p.status;
  } else if (t === 'SET_NODE_TYPE') {
    if (state[id]) state[id].node_type = p.node_type;
  } else if (t === 'UPDATE_METADATA') {
    if (state[id]) {
      const prev = state[id].metadata.description || '';
      Object.assign(state[id].metadata, p.metadata||{});
      if (prev && p.origin !== 'user') state[id].metadata.description = prev;
    }
  } else if (t === 'DETACH_NODE') {
    if (state[id]) {
      for (const dep of state[id].dependencies)
        if (state[dep]) state[dep].children = state[dep].children.filter(c => c !== id);
      for (const child of state[id].children)
        if (state[child]) state[child].dependencies = state[child].dependencies.filter(d => d !== id);
      delete state[id];
    }
  } else if (t === 'RESET_SUBTREE') {
    const visited = new Set(), queue = [id];
    while (queue.length) {
      const nid = queue.shift();
      if (visited.has(nid) || !state[nid]) continue;
      visited.add(nid);
      state[nid].status = 'pending'; state[nid].result = null;
      queue.push(...(state[nid].children||[]));
    }
  } else if (t === 'MARK_AWAITING_INPUT') {
    if (state[id]) {
      state[id].status = 'awaiting_input';
      state[id].metadata.missing_fields        = p.missing_fields        || [];
      state[id].metadata.awaiting_input_reason = p.awaiting_input_reason || '';
    }
  } else if (t === 'RESUME_NODE') {
    if (state[id]) {
      state[id].status = 'pending';
      state[id].result = null;
      delete state[id].metadata.missing_fields;
      delete state[id].metadata.awaiting_input_reason;
      delete state[id].metadata.retry_count;
      delete state[id].metadata.retry_after;
      delete state[id].metadata.verification_failure;
    }
  }
}

function recomputeReadiness(state) {
  for (const node of Object.values(state)) {
    if (['done','running','failed','to_be_expanded','awaiting_input'].includes(node.status)) continue;
    node.status = node.dependencies.every(d => state[d]?.status === 'done') ? 'ready' : 'pending';
  }
}

function deepCopyState(state) {
  const out = {};
  for (const [k, n] of Object.entries(state)) {
    out[k] = { id: n.id, node_type: n.node_type, status: n.status,
      dependencies: n.dependencies.slice(), children: n.children.slice(),
      result: n.result, metadata: Object.assign({}, n.metadata), origin: n.origin };
  }
  return out;
}

// ── Jump to frame N (uses nearest checkpoint for instant scrubbing) ───────────

function jumpToFrame(n) {
  n = Math.max(0, Math.min(n, REPLAY_EVENTS.length));
  const cpIdx = Math.min(Math.floor(n / CHECKPOINT_EVERY), replayCheckpoints.length - 1);
  replayState = deepCopyState(replayCheckpoints[cpIdx]);
  const startFrame = cpIdx * CHECKPOINT_EVERY;
  for (let i = startFrame; i < n; i++) {
    applyEventInPlace(replayState, REPLAY_EVENTS[i]);
    recomputeReadiness(replayState);
  }
  replayFrame = n;
  refreshReplayUI();
  renderDAG();
}

// ── Playback controls ─────────────────────────────────────────────────────────

function togglePlay() {
  if (replayPlaying) pauseReplay(); else startPlay();
}

function startPlay() {
  if (replayFrame >= REPLAY_EVENTS.length) jumpToFrame(0);
  replayPlaying = true;
  document.getElementById('btn-play-pause').textContent = '⏸';
  scheduleNextTick();
}

function pauseReplay() {
  replayPlaying = false;
  document.getElementById('btn-play-pause').textContent = '▶';
  clearTimeout(replayTimer);
  // Cancel auto-close so the panel stays open for the user to read while paused
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; }
}

function scheduleNextTick() {
  const ms = parseInt(document.getElementById('replay-speed').value, 10);
  replayTimer = setTimeout(playTick, ms);
}

function playTick() {
  if (!replayPlaying) return;
  if (replayFrame >= REPLAY_EVENTS.length) { pauseReplay(); return; }
  const evt = REPLAY_EVENTS[replayFrame];
  applyEventInPlace(replayState, evt);
  recomputeReadiness(replayState);
  replayFrame++;
  refreshReplayUI();
  renderDAG();
  if (replayFirstFit && Object.keys(replayState).length > 0) {
    fitGraph(); replayFirstFit = false;
  }

  // Auto-open the info panel whenever a node receives a result
  const t = evt.type, p = evt.payload || {};
  const hasResult = p.result != null && p.result !== '';
  if (hasResult && (t === 'MARK_DONE' || t === 'SET_RESULT')) {
    autoOpenNode(p.node_id);
  }

  scheduleNextTick();
}

function replayStep(delta) { pauseReplay(); jumpToFrame(replayFrame + delta); }
function replayJumpStart() { pauseReplay(); jumpToFrame(0); }
function replayJumpEnd()   { pauseReplay(); jumpToFrame(REPLAY_EVENTS.length); }
function scrubTo(n)        { pauseReplay(); jumpToFrame(n); }

// ── Enter / exit replay mode ──────────────────────────────────────────────────

function toggleReplayMode() {
  if (replayMode) exitReplayMode(); else enterReplayMode();
}

function enterReplayMode() {
  replayMode = true; replayPlaying = false;
  replayFirstFit = true; replayState = {}; replayFrame = 0;
  document.getElementById('btn-replay').classList.add('active');
  document.getElementById('btn-replay').textContent = '■ Exit replay';
  document.getElementById('replay-bar').classList.remove('hidden');
  document.getElementById('replay-scrubber').max = REPLAY_EVENTS.length;
  document.getElementById('btn-play-pause').textContent = '▶';
  if (selectedId) closePanel();
  renderDAG(); refreshReplayUI(); startPlay();
}

function exitReplayMode() {
  pauseReplay(); replayMode = false;
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  document.getElementById('btn-replay').classList.remove('active');
  document.getElementById('btn-replay').textContent = '▶ Replay';
  document.getElementById('replay-bar').classList.add('hidden');
  if (selectedId && !nodes[selectedId]) closePanel();
  renderDAG(); fitGraph();
}

// ── UI refresh ────────────────────────────────────────────────────────────────

function refreshReplayUI() {
  document.getElementById('replay-scrubber').value = replayFrame;
  document.getElementById('replay-frame-count').textContent =
    replayFrame + ' / ' + REPLAY_EVENTS.length;
  const evt = REPLAY_EVENTS[Math.max(0, replayFrame - 1)];
  document.getElementById('replay-event-label').textContent =
    evt ? describeEvent(evt) : '—';

  // Update status count pills to reflect current replay state
  if (replayMode) {
    const counts = {};
    for (const n of Object.values(replayState)) {
      if (n.node_type === 'execution_step') continue;
      counts[n.status] = (counts[n.status] || 0) + 1;
    }
    const visible = Object.values(replayState).filter(n => n.node_type !== 'execution_step');
    document.getElementById('cnt-done').textContent    = counts.done    || 0;
    document.getElementById('cnt-failed').textContent  = counts.failed  || 0;
    document.getElementById('cnt-pending').textContent =
      (counts.pending || 0) + (counts.ready || 0) + (counts.running || 0);
    document.getElementById('cnt-total').textContent   = visible.length;
    const awaitingCount = counts.awaiting_input || 0;
    document.getElementById('cnt-awaiting').textContent = awaitingCount;
    const awaitingPill = document.getElementById('pill-awaiting');
    if (awaitingPill) awaitingPill.style.display = awaitingCount > 0 ? '' : 'none';
  }
}

function describeEvent(evt) {
  const t = evt.type, p = evt.payload||{};
  const id = (p.node_id||'').replace(/_/g,' ');
  switch(t) {
    case 'ADD_NODE':          return '+ ' + id + ' [' + (p.node_type||'task') + ']';
    case 'REMOVE_NODE':       return '− ' + id;
    case 'ADD_DEPENDENCY':    return (p.depends_on||'').replace(/_/g,' ') + ' → ' + id;
    case 'REMOVE_DEPENDENCY': return 'remove edge → ' + id;
    case 'MARK_RUNNING':      return '▶ ' + id;
    case 'MARK_DONE':         return '✓ ' + id;
    case 'MARK_FAILED':       return '✗ ' + id;
    case 'MARK_AWAITING_INPUT': return '⏳ awaiting · ' + id;
    case 'RESUME_NODE':       return '↻ resume · ' + id;
    case 'RESET_NODE':        return '↺ ' + id;
    case 'UPDATE_METADATA':   return '· ' + id;
    case 'SET_RESULT':        return '≡ result → ' + id;
    case 'SET_NODE_TYPE':     return '⟲ type → ' + id;
    case 'RESET_SUBTREE':     return '↺ subtree ' + id;
    default:                  return t.toLowerCase().replace(/_/g,' ');
  }
}

// Keyboard shortcuts when in replay mode
document.addEventListener('keydown', e => {
  if (!replayMode) return;
  if (e.key === 'Escape')      exitReplayMode();
  else if (e.key === ' ')      { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); replayStep(1); }
  else if (e.key === 'ArrowLeft')  { e.preventDefault(); replayStep(-1); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────

initSVG();

const hasNodes = Object.keys(nodes).length > 0;
document.getElementById('empty-state').classList.toggle('hidden', hasNodes);

if (hasNodes) {
  renderDAG();
  fitGraph();
}
</script>

<!-- ── Replay bar ──────────────────────────────────────────────────────── -->
<div id="replay-bar" class="hidden">
  <button class="replay-btn" onclick="replayJumpStart()" title="Start">⏮</button>
  <button class="replay-btn" onclick="replayStep(-1)"    title="Step back">◀</button>
  <button class="replay-btn primary" id="btn-play-pause"
          onclick="togglePlay()" title="Play / Pause">▶</button>
  <button class="replay-btn" onclick="replayStep(1)"     title="Step forward">▶</button>
  <button class="replay-btn" onclick="replayJumpEnd()"   title="End">⏭</button>
  <span id="replay-event-label">—</span>
  <input id="replay-scrubber" type="range" min="0" max="0" value="0"
         oninput="scrubTo(+this.value)">
  <span id="replay-frame-count">0 / 0</span>
  <select id="replay-speed">
    <option value="1000">Slow</option>
    <option value="300" selected>Normal</option>
    <option value="100">Fast</option>
    <option value="30">Faster</option>
  </select>
</div>
</body>
