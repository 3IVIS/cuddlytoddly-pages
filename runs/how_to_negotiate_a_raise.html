 years): $60,000 - $90,000 per year\n- Senior-level (8-12 years): $90,000 - $120,000 per year\n- Executive-level (13+ years): $120,000 - $180,000 per year\nNote: These are general salary benchmarks and may vary based on factors such as location, industry, and company size.", "metadata": {"description": "Research industry salary standards for the user's position.", "output": [{"description": "A report detailing average salary ranges for the user's job title in their location, including sources and methodology.", "name": "salary_benchmarks_report", "type": "document"}], "parallel_group": "Research", "required_input": [{"description": "The user's job title, which may be unknown and needs clarification.", "name": "job_title", "type": "text"}], "parent_goal": "Prepare_me_to_negotiate_a_raise_for_my_job", "reflection_notes": [], "broadened_description": "Research general salary benchmarks for various job roles and produce a summary of typical ranges by experience level.", "broadened_for_missing": ["job_title"], "broadened_reason": "This task's output relies on knowing the user's job title to provide a useful result, which is currently unknown.", "broadened_output": [{"description": "Summary of typical salary ranges by experience level for various job roles.", "name": "salary_benchmarks_summary", "type": "document"}], "verified": true}}, "Identify_Personal_Achievements": {"id": "Identify_Personal_Achievements", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["clarification_Prepare_me_to_negotiate_a_raise_for_my_job"], "children": ["Prepare_Negotiation_Pitch"], "result": "## Achievements Template\n\n### Introduction\nPlease fill in the following sections to articulate your professional achievements.\n\n### Achievement 1\n* Project/Task: _______________________________\n* Description: _______________________________\n* Impact: _______________________________\n* Skills Used: _______________________________\n\n### Achievement 2\n* Project/Task: __ nts.", "name": "achievements_template", "type": "document"}], "verified": true}}, "Determine_Negotiation_Strategy": {"id": "Determine_Negotiation_Strategy", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["clarification_Prepare_me_to_negotiate_a_raise_for_my_job"], "children": ["Prepare_Negotiation_Pitch"], "result": "negotiation_guide: \n# Introduction to Negotiation Strategies\nEffective negotiation is a crucial skill in various aspects of life, including personal and professional settings. It involves reaching a mutually beneficial agreement between two or more parties. Understanding different negotiation strategies and techniques can significantly improve one's ability to negotiate successfully.\n\n# Understanding Personal Styles\nBefore diving into negotiation strategies, it's essential to understand the different personal styles that may be encountered during a negotiation. These styles include:\n    * Competitive: Focuses on winning the negotiation, often at the expense of the other party.\n    * Collaborative: Seeks a mutually beneficial agreement, prioritizing the relationship and finding a solution that satisfies both parties.\n    * Compromising: Involves finding a middle ground, where both parties make concessions to reach an agreement.\n    * Avoiding: Tends to evade conflict and may settle for an unsatisfactory agreement to maintain peace.\n    * Accommodating: Prioritizes the other party's needs, often at the expense of one's own interests.\n\n# General Negotiation Strategies\n1. **Separate the People from the Problem**: Focus on the issue at hand, rather than making personal attacks or taking things personally.\n2. **Focus on Interests, Not Positions**: Understand the underlying interests, needs, and concerns of both parties to find creative solutions.\n3. **Use Objective Criteria**: Rely on facts, data, and expert opinions to support arguments and find mutually acceptable solutions.\n4. **Make a Good First Offer**: The iation_style"], "broadened_reason": "This task's output is not private personal information but it requires clarification on the user's negotiation style to produce a useful result.", "broadened_output": [{"description": "Guide covering general negotiation strategies and techniques for different personal styles", "name": "negotiation_guide", "type": "document"}], "verified": true}}, "Gather_Company_Information": {"id": "Gather_Company_Information", "node_type": "task", "status": "done", "origin": "planning", "dependencies": ["clarification_Prepare_me_to_negotiate_a_raise_for_my_job"], "children": ["Prepare_Negotiation_Pitch"], "result": "Company budget cycles can vary depending on the industry, size, and type of company. However, most companies follow a similar pattern:\n\n    * Quarterly budget reviews: Companies typically review their budgets on a quarterly basis to ensure they are on track to meet their financial goals.\n    * Annual budget planning: Companies usually start planning their annual budgets 2-3 months before the start of the new fiscal year.\n    * Mid-year budget reviews: Companies may conduct mid-year budget reviews to assess their progress and make adjustments as needed.\n\nRaise feasibility signals:\n\n    * Company performance: A company's financial performance can impact its ability to offer raises. If the company is performing well, it may be more likely to offer raises.\n    * Industry standards: Companies may offer raises based on industry standards and benchmarks.\n    * Employee performance: An employee's performance and contributions to the company can also impact the likelihood of a raise.\n\nCulture indicators relevant to salary negotiation:\n\n    * Transparency: Companies that are transparent about their budget and financial situation may be more open to salary negotiations.\n    * Communication: Companies that encourage open communication and feedback may be more receptive to employee concerns about salary.\n    * Employee value: Com ent 1\n* Project/Task: _______________________________\n* Description: _______________________________\n* Impact: _______________________________\n* Skills Used: _______________________________\n\n### Achievement 2\n* Project/Task: _______________________________\n* Description: _______________________________\n* Impact: _______________________________\n* Skills Used: _______________________________\n\n### Achievement 3\n* Project/Task: _______________________________\n* Description: _______________________________\n* Impact: _______________________________\n* Skills Used: _______________________________\n\n### Guided Questions\n1. What were some of the biggest challenges you faced in your role, and how did you overcome them?\n2. Can you describe a project or task where you had to work collaboratively with others? What was your role, and what did you learn from the experience?\n3. How have you contributed to the growth or improvement of your organization?\n4. What skills or areas of expertise have you developed or strengthened during your time in this role?\n5. Are there any specific accomplishments or achievements that you are particularly proud of? Why are they significant to you?"}, "timestamp": "2026-04-06T09:45:20.070108+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Identify_Personal_Achievements", "metadata": {"verified": true}}, "timestamp": "2026-04-06T09:45:20.070314+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "clarification_Prepare_me_to_negotiate_a_raise_for_my_job", "metadata": {"fields": [{"key": "current_salary", "label": "Current salary", "rationale": "To determine the raise amount", "value": "unknown"}, {"key": "job_title", "label": "Job title", "rationale": "To research industry standards", "value": "unknown"}, {"key": "performance_review_date", "label": "Next performance review date", "rationale": "To time the negotiation", "value": "unknown"}, {"key": "company_budget_constraints", "label": "Company budget constraints ode_id": "Determine_Negotiation_Strategy", "metadata": {"broadened_description": "Research general negotiation strategies and produce a guide on effective negotiation techniques for various personal styles", "broadened_for_missing": ["negotiation_style"], "broadened_reason": "This task's output is not private personal information but it requires clarification on the user's negotiation style to produce a useful result.", "broadened_output": [{"description": "Guide covering general negotiation strategies and techniques for different personal styles", "name": "negotiation_guide", "type": "document"}]}}, "timestamp": "2026-04-06T09:47:50.393278+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Determine_Negotiation_Strategy", "result": "negotiation_guide: \n# Introduction to Negotiation Strategies\nEffective negotiation is a crucial skill in various aspects of life, including personal and professional settings. It involves reaching a mutually beneficial agreement between two or more parties. Understanding different negotiation strategies and techniques can significantly improve one's ability to negotiate successfully.\n\n# Understanding Personal Styles\nBefore diving into negotiation strategies, it's essential to understand the different personal styles that may be encountered during a negotiation. These styles include:\n    * Competitive: Focuses on winning the negotiation, often at the expense of the other party.\n    * Collaborative: Seeks a mutually beneficial agreement, prioritizing the relationship and finding a solution that satisfies both parties.\n    * Compromising: Involves finding a middle ground, where both parties make concessions to reach an agreement.\n    * Avoiding: Tends to evade conflict and may settle for an unsatisfactory agreement to maintain peace.\n    * Accommodating: Prioritizes the other party's needs, often at the expense of one's own interests.\n\n# General Negotiation Strategies\n1. **Separate the People from the Problem**: Focus on the issue at hand, rather than making personal attacks or taking things personally.\n2. **Focus on Interests, Not Positions**: Understand the underlying interests, needs, and concerns of both parties to find creative solutions.\n3. **Use Objective Criteria**: Rely on facts, data, and expert opinions to support arguments and find mutually acceptable solutions.\n4. **Make a Good First Offer**: The first offer can set the tone for the negotiation. Make it realistic and based on thorough research.\n5. **Use Time to Your Advantage**: Time pressure can affect the negotiation outcome. Be patient and use time to reconsider or regroup if necessary.\n\n# Techniques for Different Personal Styles\n* For Competitive Negotiators: Stay calm, be well-prepared, and focus on the interests behind their position.\n* For Collaborative Negotiators: Engage in open communication, seek mutual benefits, and be willing to make concessions.\n* For Compromising Negotiators: Be flexible, look for creative solutions, and prioritize building trust.\n* For Avoiding Negotiators: Encourage open discussion, address concerns directly, and seek a mutually beneficial agreement.\n* For Accommodating Negotiators: Respect their willingness to cooperate, ensure their needs are met, and maintain a fair balance in the agreement.\n\n# Conclusion\nMastering negotiation strategies and understanding different personal styles can significantly enhance one's negotiation skills. By applying these strategies and techniques, individuals can navigate various negotiation scenarios more effectively, leading to more successful outcomes."}, "timestamp": "2026-04-06T09:48:14.516279+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Determine_Negotiation_Strategy", "metadata": {"verified": true}}, "timestamp": "2026-04-06T09:48:14.516661+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "clarification_Prepare_me_to_negotiate_a_raise_for_my_job", "metadata": {"fields": [{"key": "current_salary", "label": "Cu et a target for the negotiation\", \"value\": \"unknown\"}, {\"key\": \"additional_context\", \"label\": \"Anything else I should know?\", \"rationale\": \"Free-form context that does not fit the fields above.\", \"value\": \"unknown\"}, {\"key\": \"negotiation_style\", \"label\": \"Negotiation Style\", \"value\": \"unknown\", \"rationale\": \"Required by task 'Determine_Negotiation_Strategy': The user's negotiation style, which may need clarification.\"}, {\"key\": \"company_name\", \"label\": \"Company name\", \"rationale\": \"To identify the specific company for budget and culture research.\", \"value\": \"unknown\"}]"}, "timestamp": "2026-04-06T09:50:13.338751+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Gather_Company_Information", "metadata": {"broadened_description": "Research general factors that affect company budget constraints and workplace culture in salary negotiation contexts.", "broadened_for_missing": ["company_name"], "broadened_reason": "This task's output depends on knowing the specific company, which is currently unknown.", "broadened_output": [{"description": "Guide covering typical company budget cycles, raise feasibility signals, and culture indicators relevant to salary negotiation.", "name": "company_factors_guide", "type": "document"}]}}, "timestamp": "2026-04-06T09:50:13.338958+00:00"}, {"type": "MARK_DONE", "payload": {"node_id": "Gather_Company_Information", "result": "Company budget cycles can vary depending on the industry, size, and type of company. However, most companies follow a similar pattern:\n\n    * Quarterly budget reviews: Companies typically review their budgets on a quarterly basis to ensure they are on track to meet their financial goals.\n    * Annual budget planning: Companies usually start planning their annual budgets 2-3 months before the start of the new fiscal year.\n    * Mid-year budget reviews: Companies may conduct mid-year budget reviews to assess their progress and make adjustments as needed.\n\nRaise feasibility signals:\n\n    * Company performance: A company's financial performance can impact its ability to offer raises. If the company is performing well, it may be more likely to offer raises.\n    * Industry standards: Companies may offer raises based on industry standards and benchmarks.\n    * Employee performance: An employee's performance and contributions to the company can also impact the likelihood of a raise.\n\nCulture indicators relevant to salary negotiation:\n\n    * Transparency: Companies that are transparent about their budget and financial situation may be more open to salary negotiations.\n    * Communication: Companies that encourage open communication and feedback may be more receptive to employee concerns about salary.\n    * Employee value: Companies that prioritize employee value and well-being may be more likely to offer competitive salaries and benefits.\n\nTo negotiate a salary effectively, it's essential to understand the company's budget cycle, raise feasibility signals, and culture indicators. This knowledge can help employees make informed decisions and prepare for salary negotiations."}, "timestamp": "2026-04-06T09:50:35.160371+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Gather_Company_Information", "metadata": {"verified": true}}, "timestamp": "2026-04-06T09:50:35.160555+00:00"}, {"type": "MARK_RUNNING", "payload": {"node_id": "Prepare_Negotiation_Pitch"}, "timestamp": "2026-04-06T09:50:59.097912+00:00"}, {"type": "UPDATE_METADATA", "payload": {"node_id": "Prepare_Negotiation_Pitch", "metadata": {"broadened_description": "Research general factors that affect salary negotiation, including average salary ranges, negotiation strategies, and company context, to produce a useful negotiation pitch template.", "broadened_for_missing": ["company_information_report", "negotiation_strategy", "personal_achievements_list", "salary_benchmarks_report"], "broadened_reason": "This task's output is dependent on private <script>
// ── Embedded data ─────────────────────────────────────────────────────────────

const nodes = SNAPSHOT_NODES;
const meta  = EXPORT_META;

// ── Constants ────────────────────────────────────────────────────────────────

const STATUS_COLOR_HEX = {
  pending: '#475569', ready: '#3b82f6', running: '#f59e0b',
  done: '#10b981', failed: '#ef4444', to_be_expanded: '#8b5cf6',
  awaiting_input: '#e879f9',
};
const TYPE_ICON  = { goal: '◎', task: '▣', reflection: '◈', execution_step: '·', clarification: '?' };
const TYPE_COLOR = { goal: '#a78bfa', task: '#7dd3fc', reflection: '#86efac', execution_step: '#475569', clarification: '#f9a825' };
const NODE_W = 210, NODE_H = 54;

// ── Header ────────────────────────────────────────────────────────────────────

(function populateHeader() {
  // Goal title
  const goal = Object.values(nodes).find(n => n.node_type === 'goal');
  const goalDesc = goal?.metadata?.description || goal?.id || '';
  if (goalDesc) {
    const el = document.getElementById('toolbar-goal');
    el.textContent = `⊹ ${goalDesc}`;
    el.title = goalDesc;
  }

  // Status counts
  const counts = {};
  for (const n of Object.values(nodes)) {
    if (n.node_type === 'execution_step') continue;
    counts[n.status] = (counts[n.status] || 0) + 1;
  }
  const visible = Object.values(nodes).filter(n => n.node_type !== 'execution_step');
  document.getElementById('cnt-done').textContent    = counts.done    || 0;
  document.getElementById('cnt-failed').textContent  = counts.failed  || 0;
  document.getElementById('cnt-pending').textContent =
    (counts.pending || 0) + (counts.ready || 0) + (counts.running || 0);
  const awaitingCount = counts.awaiting_input || 0;
  document.getElementById('cnt-awaiting').textContent = awaitingCount;
  const awaitingPill = document.getElementById('pill-awaiting');
  if (awaitingPill) awaitingPill.style.display = awaitingCount > 0 ? '' : 'none';
  document.getElementById('cnt-total').textContent   = visible.length;

  // Timestamp
  document.getElementById('toolbar-ts').textContent =
    `Exported ${meta.timestamp}`;
  document.title = goalDesc
    ? `cuddlytoddly — ${goalDesc}`
    : 'cuddlytoddly — DAG snapshot';
})();

// ── State ────────────────────────────────────────────────────────────────────

let selectedId  = null;
let currentG    = null;
let svg, svgG, zoomBehavior;

// ── SVG init ─────────────────────────────────────────────────────────────────

function initSVG() {
  svg = d3.select('#dag-canvas');

  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '-0 -4 8 8')
    .attr('refX', 7).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#2e3f58');

  svgG = svg.append('g').attr('class', 'root');
  svgG.append('g').attr('class', 'edge-layer');
  svgG.append('g').attr('class', 'node-layer');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.08, 4])
    .on('zoom', e => svgG.attr('transform', e.transform));
  svg.call(zoomBehavior);
}

// ── Layout + Render ──────────────────────────────────────────────────────────

function renderDAG() {
  const g = new dagre.graphlib.Graph({ multigraph: false });
  g.setGraph({ rankdir: 'TB', ranksep: 80, nodesep: 44, marginx: 48, marginy: 48 });
  g.setDefaultEdgeLabel(() => ({}));

  const _src = (replayMode ? replayState : nodes);
  const visible = Object.entries(_src)
    .filter(([, n]) => n.node_type !== 'execution_step');

  for (const [id] of visible) {
    g.setNode(id, { width: NODE_W, height: NODE_H });
  }
  const visibleIds = new Set(visible.map(([id]) => id));
  for (const [id, node] of visible) {
    for (const dep of node.dependencies) {
      if (visibleIds.has(dep)) g.setEdge(dep, id);
    }
  }
  dagre.layout(g);
  currentG = g;

  // Edges
  const line = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);
  const edgeLayer = svgG.select('.edge-layer');
  const edgeData = g.edges().map(e => ({
    key: `${e.v}__${e.w}`, v: e.v, w: e.w, points: g.edge(e).points,
  }));
  const edges = edgeLayer.selectAll('path.edge-path').data(edgeData, d => d.key);
  edges.enter().append('path').attr('class', 'edge-path')
    .merge(edges)
    .attr('d', d => line(d.points))
    .attr('stroke', d => STATUS_COLOR_HEX[_src[d.v]?.status] || '#2e3f58')
    .attr('stroke-opacity', d => _src[d.v]?.status === 'done' ? 0.35 : 0.55);
  edges.exit().remove();

  // Nodes
  const nodeLayer = svgG.select('.node-layer');
  const nodeData = g.nodes().filter(id => nodes[id])
    .map(id => ({ id, pos: g.node(id), node: nodes[id] }));

  const nodeGs = nodeLayer.selectAll('g.node-g').data(nodeData, d => d.id);

  const entered = nodeGs.enter().append('g')
    .attr('class', 'node-g')
    .on('click', (e, d) => { e.stopPropagation(); selectNode(d.id); });

  entered.append('rect').attr('class', 'node-hit')
    .attr('x', -NODE_W/2 - 4).attr('y', -NODE_H/2 - 4)
    .attr('width', NODE_W + 8).attr('height', NODE_H + 8)
    .attr('rx', 10).attr('fill', 'transparent');

  entered.append('rect').attr('class', 'status-ring')
    .attr('x', -NODE_W/2 - 2).attr('y', -NODE_H/2 - 2)
    .attr('width', NODE_W + 4).attr('height', NODE_H + 4)
    .attr('rx', 9).attr('fill', 'none').attr('stroke-width', 2).attr('stroke', 'transparent');

  entered.append('rect').attr('class', 'bg')
    .attr('x', -NODE_W/2).attr('y', -NODE_H/2)
    .attr('width', NODE_W).attr('height', NODE_H).attr('rx', 7);

  entered.append('rect').attr('class', 'sbar')
    .attr('x', -NODE_W/2 + 4).attr('y', -NODE_H/2 + 7)
    .attr('width', 3).attr('height', NODE_H - 14).attr('rx', 1.5);

  entered.append('text').attr('class', 'ticon');
  entered.append('text').attr('class', 'tdesc');
  entered.append('text').attr('class', 'tstatus');
  entered.append('text').attr('class', 'ttype');

  const merged = entered.merge(nodeGs);

  merged
    .attr('transform', d => `translate(${d.pos.x}, ${d.pos.y})`)
    .attr('class', d => `node-g ${d.id === selectedId ? 'selected' : ''}`);

  const isGoal = d => d.node.node_type === 'goal';
  merged.select('.bg')
    .attr('fill', d => d.id === selectedId ? '#1e2a3d' : '#111827')
    .attr('stroke', d => d.id === selectedId ? '#6366f1' : isGoal(d) ? '#312e81' : '#1f2d42')
    .attr('stroke-width', d => d.id === selectedId ? 2 : isGoal(d) ? 1.5 : 1);

  merged.select('.status-ring')
    .attr('stroke', d => d.id === selectedId ? '#6366f1' : 'transparent')
    .attr('stroke-opacity', d => d.id === selectedId ? 0.4 : 0);

  merged.select('.sbar').attr('fill', d => STATUS_COLOR_HEX[d.node.status] || '#475569');

  merged.select('.ticon')
    .attr('x', -NODE_W/2 + 14).attr('y', -NODE_H/2 + 20)
    .attr('font-size', 12).attr('font-family', 'monospace')
    .attr('fill', d => TYPE_COLOR[d.node.node_type] || '#94a3b8')
    .text(d => TYPE_ICON[d.node.node_type] || '▣');

  merged.select('.tdesc')
    .attr('x', -NODE_W/2 + 28).attr('y', -NODE_H/2 + 20)
    .attr('font-size', 12).attr('font-family', 'system-ui, sans-serif').attr('font-weight', '500')
    .attr('fill', '#e2e8f0')
    .text(d => trunc(d.node.metadata?.description || d.id, 24));

  merged.select('.tstatus')
    .attr('x', -NODE_W/2 + 14).attr('y', -NODE_H/2 + 38)
    .attr('font-size', 10).attr('font-family', 'system-ui, sans-serif')
    .attr('fill', d => STATUS_COLOR_HEX[d.node.status] || '#475569')
    .text(d => d.node.status);

  merged.select('.ttype')
    .attr('x', NODE_W/2 - 8).attr('y', -NODE_H/2 + 38)
    .attr('font-size', 10).attr('font-family', 'system-ui, sans-serif')
    .attr('text-anchor', 'end').attr('fill', '#2e3f58')
    .text(d => d.node.node_type);

  nodeGs.exit().remove();

  svg.on('click', () => { if (selectedId) closePanel(); });
}

// ── Selection ────────────────────────────────────────────────────────────────

function selectNode(id) {
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  selectedId = id;
  renderDAG();
  updatePanel();
}

function updatePanel() {
  const _panelNodes = (replayMode ? replayState : nodes);
  const node = _panelNodes[selectedId];
  if (!node) return;

  document.getElementById('info-panel').classList.remove('hidden');
  document.getElementById('panel-title').textContent = selectedId;

  const body  = document.getElementById('panel-body');
  const desc  = node.metadata?.description || '';
  const deps  = node.dependencies || [];
  const result = node.result;
  const reqIn  = node.metadata?.required_input || [];
  const output = node.metadata?.output || [];
  const notes  = node.metadata?.reflection_notes || [];

  const _panelSrc = _panelNodes;
  const stepChildren = Object.values(_panelSrc).filter(n =>
    n.node_type === 'execution_step' &&
    n.dependencies.includes(selectedId) &&
    !n.metadata?.hidden
  );

  let html = '';

  // ── Clarification node — render fields as a structured list ──────────────
  if (node.node_type === 'clarification') {
    let fields = [];
    try { fields = JSON.parse(result || '[]'); } catch (_) {}
    let fhtml = '';
    if (desc) fhtml += row('', `<span style="color:var(--text-muted);font-size:12px">${esc(desc)}</span>`);
    fields.forEach(f => {
      const isUnknown = !f.value || f.value === 'unknown';
      const valColor  = isUnknown ? 'var(--s-failed)' : 'var(--text)';
      fhtml += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${esc(f.label || f.key)}</div>
        <div style="font-size:13px;color:${valColor};margin-bottom:3px">${esc(isUnknown ? 'unknown' : f.value)}</div>
        ${f.rationale ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic">${esc(f.rationale)}</div>` : ''}
      </div>`;
    });
    if (!fields.length) fhtml += '<div style="color:var(--text-muted);font-size:12px">No fields generated.</div>';
    body.innerHTML = fhtml;
    return;
  }

  if (desc) html += row('Description', `<span class="info-value prominent">${esc(desc)}</span>`);

  // ── Broadened description indicator ──────────────────────────────────────
  const broadDesc   = node.metadata?.broadened_description || '';
  const broadReason = node.metadata?.broadened_reason || '';
  const broadMissing = node.metadata?.broadened_for_missing || [];
  if (broadDesc) {
    const missingText = broadMissing.length
      ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">` +
        `Missing inputs: ${esc(broadMissing.join(', '))}</div>`
      : '';
    const reasonText = broadReason
      ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic;margin-top:2px">` +
        `${esc(broadReason)}</div>`
      : '';
    html += row('Running as', `
      <div style="background:var(--bg-raised);border:1px solid var(--s-running)30;border-left:3px solid var(--s-running);border-radius:4px;padding:8px 10px">
        <div style="font-size:10px;color:var(--s-running);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">
          ⟳ Broadened goal
        </div>
        <span class="info-value">${esc(broadDesc)}</span>
        ${missingText}
        ${reasonText}
      </div>`);
  }

  // ── Awaiting input indicator ──────────────────────────────────────────────
  if (node.status === 'awaiting_input') {
    const awaitReason  = node.metadata?.awaiting_input_reason || '';
    const awaitMissing = node.metadata?.missing_fields || [];
    const missingList  = awaitMissing.length
      ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">` +
        `Waiting for: ${esc(awaitMissing.join(', '))}</div>`
      : '';
    const reasonLine = awaitReason
      ? `<div style="font-size:10px;color:var(--text-dim);font-style:italic;margin-top:2px">${esc(awaitReason)}</div>`
      : '';
    html += row('Awaiting input', `
      <div style="border:1px solid var(--s-awaiting)40;border-left:3px solid var(--s-awaiting);border-radius:4px;padding:8px 10px">
        <div style="font-size:10px;color:var(--s-awaiting);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">
          ⏳ Waiting for user input
        </div>
        ${missingList}
        ${reasonLine}
      </div>`);
  }

  html += row('Status &amp; Type', `
    <span class="badge" style="color:${STATUS_COLOR_HEX[node.status]};border-color:${STATUS_COLOR_HEX[node.status]}30">
      <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLOR_HEX[node.status]};display:inline-block"></span>
      ${esc(node.status)}
    </span>
    &nbsp;
    <span class="badge" style="color:${TYPE_COLOR[node.node_type] || '#94a3b8'}">
      ${TYPE_ICON[node.node_type]} ${esc(node.node_type)}
    </span>
  `);

  if (deps.length) {
    html += row('Dependencies', deps.map(d =>
      `<span class="dep-tag" onclick="selectNode('${esc(d)}')">${esc(d)}</span>`
    ).join(''));
  }

  if (reqIn.length) {
    html += row('Requires', reqIn.map(i =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">
        <span style="color:var(--text-dim)">${esc(i.name)}</span>
        <span style="color:var(--s-pending);font-size:10px"> [${esc(i.type)}]</span>
        — ${esc(i.description || '')}
      </div>`
    ).join(''));
  }

  if (output.length) {
    html += row('Outputs', output.map(o =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">
        <span style="color:var(--text-dim)">${esc(o.name)}</span>
        <span style="color:var(--s-ready);font-size:10px"> [${esc(o.type)}]</span>
        — ${esc(o.description || '')}
      </div>`
    ).join(''));
  }

  if (result != null) {
    const label = node.node_type === 'goal' ? 'Plan' : 'Result';
    html += row(label, `<div class="result-box">${esc(String(result))}</div>`);
  }

  if (notes.length) {
    html += row('Notes', notes.map(n =>
      `<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">• ${esc(n)}</div>`
    ).join(''));
  }

  if (stepChildren.length) {
    const stepsHtml = stepChildren.map(step => {
      const icon = step.status === 'done' ? '✓' : step.status === 'failed' ? '✗' : '·';
      const col  = step.status === 'done' ? 'var(--s-done)' : step.status === 'failed' ? 'var(--s-failed)' : 'var(--s-pending)';
      return `<div class="step-item">
        <span class="step-icon" style="color:${col}">${icon}</span>
        <div>
          <div class="step-desc">${esc(step.metadata?.description || step.id)}</div>
          ${step.result ? `<div class="step-result">${esc(trunc(step.result, 120))}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    html += row('Execution Steps', `<div style="margin-top:2px">${stepsHtml}</div>`);
  }

  body.innerHTML = html || '<div style="color:var(--text-muted);font-size:12px">No details available.</div>';
}

function row(label, content) {
  return `<div class="info-row">
    <div class="info-label">${label}</div>
    <div class="info-value">${content}</div>
  </div>`;
}

function closePanel() {
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  selectedId = null;
  document.getElementById('info-panel').classList.add('hidden');
  renderDAG();
}

// ── Panel drag ────────────────────────────────────────────────────────────────

(function() {
  let dragging = false, ox, oy;
  const panel  = document.getElementById('info-panel');
  const handle = document.getElementById('panel-drag-handle');

  handle.addEventListener('mousedown', e => {
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    panel.style.left = (e.clientX - ox) + 'px';
    panel.style.top  = (e.clientY - oy) + 'px';
    panel.style.right = panel.style.bottom = 'auto';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Panel resize ──────────────────────────────────────────────────────────────

(function() {
  let resizing = false, startX, startY, startW, startH;
  const panel  = document.getElementById('info-panel');
  const handle = document.getElementById('panel-resize-handle');

  handle.addEventListener('mousedown', e => {
    resizing = true;
    startX = e.clientX; startY = e.clientY;
    const r = panel.getBoundingClientRect();
    startW = r.width; startH = r.height;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    panel.style.width    = Math.max(240, startW + (e.clientX - startX)) + 'px';
    panel.style.height   = Math.max(160, startH + (e.clientY - startY)) + 'px';
    panel.style.maxHeight = 'none';
  });
  document.addEventListener('mouseup', () => { resizing = false; });
})();

// ── Zoom controls ─────────────────────────────────────────────────────────────

function zoomIn()    { svg.transition().call(zoomBehavior.scaleBy, 1.4); }
function zoomOut()   { svg.transition().call(zoomBehavior.scaleBy, 0.7); }
function zoomReset() { fitGraph(); }

function fitGraph() {
  if (!currentG) return;
  const graph = currentG.graph();
  if (!graph.width || !graph.height) return;
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight, pad = 60;
  const scale = Math.min((W - pad*2) / graph.width, (H - pad*2) / graph.height, 1.2);
  svg.transition().duration(400).call(
    zoomBehavior.transform,
    d3.zoomIdentity
      .translate((W - graph.width * scale) / 2, (H - graph.height * scale) / 2)
      .scale(scale)
  );
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(s, n) {
  s = String(s);
  return s.length > n ? s.slice(0, n-1) + '…' : s;
}


// ── Replay engine ────────────────────────────────────────────────────────────

let replayMode    = false;
let replayState   = {};
let replayFrame   = 0;
let replayPlaying = false;
let replayTimer   = null;
let replayFirstFit = true;

// ── Replay auto-open panel ────────────────────────────────────────────────────
// While playing, every node that gets a result auto-opens the info panel for
// AUTO_OPEN_MS milliseconds, then closes automatically before the next one.

let autoOpenTimer  = null;   // setTimeout handle for auto-close
let autoOpenActive = false;  // true while the panel is open due to auto-replay
const AUTO_OPEN_MS = 2500;   // how long each result panel stays visible

function autoOpenNode(id) {
  // Skip execution_step nodes — they fire frequently and are low-signal
  const nodeType = (replayState[id] || {}).node_type;
  if (nodeType === 'execution_step') return;

  // Cancel any existing auto-close timer before opening the next node
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; }

  autoOpenActive = true;
  selectedId     = id;
  renderDAG();
  updatePanel();

  autoOpenTimer = setTimeout(() => {
    autoOpenTimer  = null;
    autoOpenActive = false;
    closePanel();
  }, AUTO_OPEN_MS);
}

const CHECKPOINT_EVERY = 20;
let   replayCheckpoints = [];

// Pre-compute checkpoints at page load (runs synchronously, fast for typical logs)
(function buildCheckpoints() {
  if (!REPLAY_EVENTS || !REPLAY_EVENTS.length) return;
  let state = {};
  replayCheckpoints.push({});          // checkpoint[0] = empty graph
  for (let i = 0; i < REPLAY_EVENTS.length; i++) {
    applyEventInPlace(state, REPLAY_EVENTS[i]);
    recomputeReadiness(state);
    if ((i + 1) % CHECKPOINT_EVERY === 0) {
      replayCheckpoints.push(deepCopyState(state));
    }
  }
  document.getElementById('btn-replay').classList.remove('hidden');
})();

// ── Mini reducer ─────────────────────────────────────────────────────────────

function applyEventInPlace(state, event) {
  const t = event.type, p = event.payload || {}, id = p.node_id;
  if (t === 'ADD_NODE' || t === 'INSERT_NODE') {
    if (!state[id]) {
      const deps = (p.dependencies || []);
      state[id] = { id, node_type: p.node_type||'task', status: 'pending',
        dependencies: deps.slice(), children: [], result: null,
        metadata: Object.assign({}, p.metadata||{}), origin: p.origin||'system' };
      for (const dep of deps)
        if (state[dep] && !state[dep].children.includes(id)) state[dep].children.push(id);
    } else {
      const prev = state[id].metadata.description || '';
      Object.assign(state[id].metadata, p.metadata||{});
      if (prev) state[id].metadata.description = prev;
      if (p.node_type) state[id].node_type = p.node_type;
    }
  } else if (t === 'REMOVE_NODE') {
    if (state[id]) {
      for (const dep of state[id].dependencies)
        if (state[dep]) state[dep].children = state[dep].children.filter(c => c !== id);
      for (const child of state[id].children)
        if (state[child]) state[child].dependencies = state[child].dependencies.filter(d => d !== id);
      delete state[id];
    }
  } else if (t === 'ADD_DEPENDENCY') {
    const [s, dep] = [p.node_id, p.depends_on];
    if (state[s]   && !state[s].dependencies.includes(dep)) state[s].dependencies.push(dep);
    if (state[dep] && !state[dep].children.includes(s))     state[dep].children.push(s);
  } else if (t === 'REMOVE_DEPENDENCY') {
    const [s, dep] = [p.node_id, p.depends_on];
    if (state[s])   state[s].dependencies = state[s].dependencies.filter(d => d !== dep);
    if (state[dep]) state[dep].children   = state[dep].children.filter(c => c !== s);
  } else if (t === 'MARK_RUNNING') {
    if (state[id]) state[id].status = 'running';
  } else if (t === 'MARK_DONE') {
    if (state[id]) { state[id].status = 'done'; if (p.result !== undefined) state[id].result = p.result; }
  } else if (t === 'MARK_FAILED') {
    if (state[id]) state[id].status = 'failed';
  } else if (t === 'RESET_NODE') {
    if (state[id]) { state[id].status = 'pending'; state[id].result = null; }
  } else if (t === 'SET_RESULT') {
    if (state[id] && p.result !== undefined) state[id].result = p.result;
  } else if (t === 'UPDATE_STATUS') {
    if (state[id]) state[id].status = p.status;
  } else if (t === 'SET_NODE_TYPE') {
    if (state[id]) state[id].node_type = p.node_type;
  } else if (t === 'UPDATE_METADATA') {
    if (state[id]) {
      const prev = state[id].metadata.description || '';
      Object.assign(state[id].metadata, p.metadata||{});
      if (prev && p.origin !== 'user') state[id].metadata.description = prev;
    }
  } else if (t === 'DETACH_NODE') {
    if (state[id]) {
      for (const dep of state[id].dependencies)
        if (state[dep]) state[dep].children = state[dep].children.filter(c => c !== id);
      for (const child of state[id].children)
        if (state[child]) state[child].dependencies = state[child].dependencies.filter(d => d !== id);
      delete state[id];
    }
  } else if (t === 'RESET_SUBTREE') {
    const visited = new Set(), queue = [id];
    while (queue.length) {
      const nid = queue.shift();
      if (visited.has(nid) || !state[nid]) continue;
      visited.add(nid);
      state[nid].status = 'pending'; state[nid].result = null;
      queue.push(...(state[nid].children||[]));
    }
  } else if (t === 'MARK_AWAITING_INPUT') {
    if (state[id]) {
      state[id].status = 'awaiting_input';
      state[id].metadata.missing_fields        = p.missing_fields        || [];
      state[id].metadata.awaiting_input_reason = p.awaiting_input_reason || '';
    }
  } else if (t === 'RESUME_NODE') {
    if (state[id]) {
      state[id].status = 'pending';
      state[id].result = null;
      delete state[id].metadata.missing_fields;
      delete state[id].metadata.awaiting_input_reason;
      delete state[id].metadata.retry_count;
      delete state[id].metadata.retry_after;
      delete state[id].metadata.verification_failure;
    }
  }
}

function recomputeReadiness(state) {
  for (const node of Object.values(state)) {
    if (['done','running','failed','to_be_expanded','awaiting_input'].includes(node.status)) continue;
    node.status = node.dependencies.every(d => state[d]?.status === 'done') ? 'ready' : 'pending';
  }
}

function deepCopyState(state) {
  const out = {};
  for (const [k, n] of Object.entries(state)) {
    out[k] = { id: n.id, node_type: n.node_type, status: n.status,
      dependencies: n.dependencies.slice(), children: n.children.slice(),
      result: n.result, metadata: Object.assign({}, n.metadata), origin: n.origin };
  }
  return out;
}

// ── Jump to frame N (uses nearest checkpoint for instant scrubbing) ───────────

function jumpToFrame(n) {
  n = Math.max(0, Math.min(n, REPLAY_EVENTS.length));
  const cpIdx = Math.min(Math.floor(n / CHECKPOINT_EVERY), replayCheckpoints.length - 1);
  replayState = deepCopyState(replayCheckpoints[cpIdx]);
  const startFrame = cpIdx * CHECKPOINT_EVERY;
  for (let i = startFrame; i < n; i++) {
    applyEventInPlace(replayState, REPLAY_EVENTS[i]);
    recomputeReadiness(replayState);
  }
  replayFrame = n;
  refreshReplayUI();
  renderDAG();
}

// ── Playback controls ─────────────────────────────────────────────────────────

function togglePlay() {
  if (replayPlaying) pauseReplay(); else startPlay();
}

function startPlay() {
  if (replayFrame >= REPLAY_EVENTS.length) jumpToFrame(0);
  replayPlaying = true;
  document.getElementById('btn-play-pause').textContent = '⏸';
  scheduleNextTick();
}

function pauseReplay() {
  replayPlaying = false;
  document.getElementById('btn-play-pause').textContent = '▶';
  clearTimeout(replayTimer);
  // Cancel auto-close so the panel stays open for the user to read while paused
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; }
}

function scheduleNextTick() {
  const ms = parseInt(document.getElementById('replay-speed').value, 10);
  replayTimer = setTimeout(playTick, ms);
}

function playTick() {
  if (!replayPlaying) return;
  if (replayFrame >= REPLAY_EVENTS.length) { pauseReplay(); return; }
  const evt = REPLAY_EVENTS[replayFrame];
  applyEventInPlace(replayState, evt);
  recomputeReadiness(replayState);
  replayFrame++;
  refreshReplayUI();
  renderDAG();
  if (replayFirstFit && Object.keys(replayState).length > 0) {
    fitGraph(); replayFirstFit = false;
  }

  // Auto-open the info panel whenever a node receives a result
  const t = evt.type, p = evt.payload || {};
  const hasResult = p.result != null && p.result !== '';
  if (hasResult && (t === 'MARK_DONE' || t === 'SET_RESULT')) {
    autoOpenNode(p.node_id);
  }

  scheduleNextTick();
}

function replayStep(delta) { pauseReplay(); jumpToFrame(replayFrame + delta); }
function replayJumpStart() { pauseReplay(); jumpToFrame(0); }
function replayJumpEnd()   { pauseReplay(); jumpToFrame(REPLAY_EVENTS.length); }
function scrubTo(n)        { pauseReplay(); jumpToFrame(n); }

// ── Enter / exit replay mode ──────────────────────────────────────────────────

function toggleReplayMode() {
  if (replayMode) exitReplayMode(); else enterReplayMode();
}

function enterReplayMode() {
  replayMode = true; replayPlaying = false;
  replayFirstFit = true; replayState = {}; replayFrame = 0;
  document.getElementById('btn-replay').classList.add('active');
  document.getElementById('btn-replay').textContent = '■ Exit replay';
  document.getElementById('replay-bar').classList.remove('hidden');
  document.getElementById('replay-scrubber').max = REPLAY_EVENTS.length;
  document.getElementById('btn-play-pause').textContent = '▶';
  if (selectedId) closePanel();
  renderDAG(); refreshReplayUI(); startPlay();
}

function exitReplayMode() {
  pauseReplay(); replayMode = false;
  if (autoOpenTimer) { clearTimeout(autoOpenTimer); autoOpenTimer = null; autoOpenActive = false; }
  document.getElementById('btn-replay').classList.remove('active');
  document.getElementById('btn-replay').textContent = '▶ Replay';
  document.getElementById('replay-bar').classList.add('hidden');
  if (selectedId && !nodes[selectedId]) closePanel();
  renderDAG(); fitGraph();
}

// ── UI refresh ────────────────────────────────────────────────────────────────

function refreshReplayUI() {
  document.getElementById('replay-scrubber').value = replayFrame;
  document.getElementById('replay-frame-count').textContent =
    replayFrame + ' / ' + REPLAY_EVENTS.length;
  const evt = REPLAY_EVENTS[Math.max(0, replayFrame - 1)];
  document.getElementById('replay-event-label').textContent =
    evt ? describeEvent(evt) : '—';

  // Update status count pills to reflect current replay state
  if (replayMode) {
    const counts = {};
    for (const n of Object.values(replayState)) {
      if (n.node_type === 'execution_step') continue;
      counts[n.status] = (counts[n.status] || 0) + 1;
    }
    const visible = Object.values(replayState).filter(n => n.node_type !== 'execution_step');
    document.getElementById('cnt-done').textContent    = counts.done    || 0;
    document.getElementById('cnt-failed').textContent  = counts.failed  || 0;
    document.getElementById('cnt-pending').textContent =
      (counts.pending || 0) + (counts.ready || 0) + (counts.running || 0);
    document.getElementById('cnt-total').textContent   = visible.length;
    const awaitingCount = counts.awaiting_input || 0;
    document.getElementById('cnt-awaiting').textContent = awaitingCount;
    const awaitingPill = document.getElementById('pill-awaiting');
    if (awaitingPill) awaitingPill.style.display = awaitingCount > 0 ? '' : 'none';
  }
}

function describeEvent(evt) {
  const t = evt.type, p = evt.payload||{};
  const id = (p.node_id||'').replace(/_/g,' ');
  switch(t) {
    case 'ADD_NODE':          return '+ ' + id + ' [' + (p.node_type||'task') + ']';
    case 'REMOVE_NODE':       return '− ' + id;
    case 'ADD_DEPENDENCY':    return (p.depends_on||'').replace(/_/g,' ') + ' → ' + id;
    case 'REMOVE_DEPENDENCY': return 'remove edge → ' + id;
    case 'MARK_RUNNING':      return '▶ ' + id;
    case 'MARK_DONE':         return '✓ ' + id;
    case 'MARK_FAILED':       return '✗ ' + id;
    case 'MARK_AWAITING_INPUT': return '⏳ awaiting · ' + id;
    case 'RESUME_NODE':       return '↻ resume · ' + id;
    case 'RESET_NODE':        return '↺ ' + id;
    case 'UPDATE_METADATA':   return '· ' + id;
    case 'SET_RESULT':        return '≡ result → ' + id;
    case 'SET_NODE_TYPE':     return '⟲ type → ' + id;
    case 'RESET_SUBTREE':     return '↺ subtree ' + id;
    default:                  return t.toLowerCase().replace(/_/g,' ');
  }
}

// Keyboard shortcuts when in replay mode
document.addEventListener('keydown', e => {
  if (!replayMode) return;
  if (e.key === 'Escape')      exitReplayMode();
  else if (e.key === ' ')      { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); replayStep(1); }
  else if (e.key === 'ArrowLeft')  { e.preventDefault(); replayStep(-1); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────

initSVG();

const hasNodes = Object.keys(nodes).length > 0;
document.getElementById('empty-state').classList.toggle('hidden', hasNodes);

if (hasNodes) {
  renderDAG();
  fitGraph();
}
</script>

<!-- ── Replay bar ──────────────────────────────────────────────────────── -->
<div id="replay-bar" class="hidden">
  <button class="replay-btn" onclick="replayJumpStart()" title="Start">⏮</button>
  <button class="replay-btn" onclick="replayStep(-1)"    title="Step back">◀</button>
  <button class="replay-btn primary" id="btn-play-pause"
          onclick="togglePlay()" title="Play / Pause">▶</button>
  <button class="replay-btn" onclick="replayStep(1)"     title="Step forward">▶</button>
  <button class="replay-btn" onclick="replayJumpEnd()"   title="End">⏭</button>
  <span id="replay-event-label">—</span>
  <input id="replay-scrubber" type="range" min="0" max="0" value="0"
         oninput="scrubTo(+this.value)">
  <span id="replay-frame-count">0 / 0</span>
  <select id="replay-speed">
    <option value="1000">Slow</option>
    <option value="300" selected>Normal</option>
    <option value="100">Fast</option>
    <option value="30">Faster</option>
  </select>
</div>
</body>
</html>
